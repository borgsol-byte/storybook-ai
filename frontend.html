<!DOCTYPE html>
<html lang="no">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<title>StoryBook AI</title>
<link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@700;900&family=Lora:ital,wght@0,400;0,500;1,400&display=swap" rel="stylesheet">
<style>
:root{
  --ink:#1a1520;--paper:#faf6ef;--gold:#b8912a;--gold2:#d4a843;
  --warm:#8b6914;--muted:#7a6e5a;--light:#ede5d4;--err:#c0392b;
  --ok:#2d7a4f;--r:13px;--sh:0 3px 20px rgba(0,0,0,0.09);
}
*{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent}
body{background:var(--paper);color:var(--ink);font-family:'Lora',Georgia,serif;min-height:100vh}

/* Header */
.hdr{background:var(--ink);text-align:center;padding:24px 20px 16px;position:relative;overflow:hidden}
.hdr::before{content:'';position:absolute;inset:0;background:radial-gradient(ellipse at 50% 130%,rgba(184,145,42,0.18) 0%,transparent 65%)}
.hdr-eye{font-size:10px;letter-spacing:5px;color:var(--gold);text-transform:uppercase;margin-bottom:6px;position:relative}
.hdr-title{font-family:'Playfair Display',serif;font-size:clamp(28px,8vw,48px);font-weight:900;line-height:1;position:relative;
  background:linear-gradient(135deg,#f0d878,var(--gold2),#c9922a,#f0d878);background-size:300% 100%;
  -webkit-background-clip:text;-webkit-text-fill-color:transparent;animation:shimmer 5s linear infinite}
.hdr-row{display:flex;align-items:center;justify-content:center;gap:12px;margin-top:10px;position:relative}
.hdr-sub{font-size:12px;color:#5a5060;font-style:italic}
.status-pill{display:inline-flex;align-items:center;gap:5px;padding:4px 12px;border-radius:16px;font-size:11px;border:1px solid;transition:all 0.3s;cursor:pointer}
.status-pill.ok {background:rgba(45,122,79,0.15);border-color:rgba(45,122,79,0.4);color:#2d7a4f}
.status-pill.err{background:rgba(192,57,43,0.12);border-color:rgba(192,57,43,0.35);color:#c0392b}
.status-pill.chk{background:rgba(255,255,255,0.05);border-color:rgba(255,255,255,0.1);color:#4a4060}
.pdot{width:6px;height:6px;border-radius:50%;background:currentColor;animation:pulse 2s infinite}
.user-btn{background:rgba(255,255,255,0.08);border:1px solid rgba(255,255,255,0.15);border-radius:16px;color:#c8b99a;font-size:11px;padding:4px 12px;cursor:pointer;font-family:'Lora',serif}
@keyframes shimmer{0%{background-position:0%}100%{background-position:300%}}
@keyframes pulse{0%,100%{opacity:1}50%{opacity:0.35}}

/* Tabs */
.tabs{display:flex;background:var(--ink);border-bottom:1px solid rgba(184,145,42,0.18);overflow-x:auto;scrollbar-width:none}
.tabs::-webkit-scrollbar{display:none}
.tab{flex:1;min-width:60px;padding:11px 4px 9px;background:none;border:none;border-bottom:2.5px solid transparent;
  color:#3a3030;font-size:10px;font-family:'Lora',serif;cursor:pointer;text-align:center;transition:all 0.2s;white-space:nowrap}
.tab.active{color:var(--gold2);border-bottom-color:var(--gold2)}
.tab.done{color:#5a4a30}
.tab-icon{display:block;font-size:17px;margin-bottom:2px}

/* Layout */
.main{max-width:600px;margin:0 auto;padding:18px 14px 90px}

/* Cards */
.card{background:#fff;border:1px solid var(--light);border-radius:var(--r);padding:18px;margin-bottom:14px;box-shadow:var(--sh)}
.card-title{font-family:'Playfair Display',serif;font-size:11px;font-weight:700;letter-spacing:1.2px;color:var(--gold);text-transform:uppercase;margin-bottom:13px}

/* Form */
.lbl{display:block;font-size:13px;color:var(--warm);margin-bottom:5px;font-weight:500}
.hint{font-size:12px;color:var(--muted);font-style:italic;margin-top:5px;line-height:1.55}
input[type=text],input[type=password],textarea{width:100%;padding:11px 13px;background:var(--paper);border:1.5px solid var(--light);
  border-radius:9px;color:var(--ink);font-family:'Lora',serif;font-size:14px;outline:none;transition:border 0.2s;-webkit-appearance:none}
input:focus,textarea:focus{border-color:var(--gold2)}
textarea{resize:vertical;line-height:1.7}
.mono{font-family:'Courier New',monospace;font-size:12.5px;line-height:1.6}

/* Buttons */
.btn{display:inline-flex;align-items:center;justify-content:center;gap:7px;padding:13px 20px;border-radius:28px;border:none;
  font-family:'Playfair Display',serif;font-size:14px;font-weight:700;cursor:pointer;transition:all 0.18s;width:100%;-webkit-appearance:none}
.btn:active{transform:scale(0.97)}
.btn-primary{background:linear-gradient(135deg,var(--gold),var(--gold2));color:#fff;font-size:15px;padding:15px;box-shadow:0 4px 16px rgba(184,145,42,0.28)}
.btn-primary:disabled{opacity:0.38;cursor:not-allowed;transform:none}
.btn-secondary{background:transparent;border:1.5px solid var(--light);color:var(--muted)}
.btn-ghost{background:transparent;border:1.5px solid var(--gold);color:var(--gold)}
.btn-danger{background:rgba(192,57,43,0.1);border:1.5px solid rgba(192,57,43,0.4);color:var(--err)}
.btn-small{padding:8px 16px;font-size:12px;border-radius:20px;width:auto}
.btn-row{display:flex;gap:9px}
.btn-row .btn{flex:1}

/* Upload */
.upload-zone{border:2px dashed var(--light);border-radius:9px;padding:16px;text-align:center;cursor:pointer;background:var(--paper);transition:border 0.2s}
.upload-zone:active{border-color:var(--gold2)}
.thumbs{display:flex;flex-wrap:wrap;gap:7px;margin-top:10px}
.thumb{position:relative;width:64px;height:64px;border-radius:8px;overflow:hidden;border:2px solid var(--light)}
.thumb img{width:100%;height:100%;object-fit:cover;display:block}
.thumb-del{position:absolute;top:-5px;right:-5px;width:18px;height:18px;background:var(--err);border:2px solid #fff;border-radius:50%;color:#fff;font-size:10px;font-weight:700;display:flex;align-items:center;justify-content:center;cursor:pointer}

/* Character items */
.char-item{display:flex;gap:10px;align-items:flex-start;padding:12px;background:var(--paper);border:1px solid var(--light);border-radius:9px;margin-bottom:8px}
.char-thumb{width:50px;height:50px;border-radius:7px;object-fit:cover;border:2px solid var(--light);flex-shrink:0}
.char-thumb-empty{width:50px;height:50px;border-radius:7px;background:var(--light);display:flex;align-items:center;justify-content:center;font-size:20px;flex-shrink:0}
.char-info{flex:1;min-width:0}
.char-id{font-size:10px;color:var(--gold);font-family:'Playfair Display',serif;font-weight:700;letter-spacing:1px;margin-bottom:3px}

/* Preview table */
.preview-table{width:100%;border-collapse:collapse;font-size:12px}
.preview-table th{text-align:left;padding:6px 8px;color:var(--gold);font-family:'Playfair Display',serif;font-weight:700;font-size:10px;letter-spacing:1px;text-transform:uppercase;border-bottom:1px solid var(--light)}
.preview-table td{padding:7px 8px;border-bottom:1px solid var(--light);vertical-align:top;color:var(--muted);line-height:1.4}
.preview-table td:first-child{color:var(--gold);font-family:'Playfair Display',serif;font-weight:700;white-space:nowrap}
.preview-table tr:last-child td{border-bottom:none}
.tag{display:inline-block;background:rgba(184,145,42,0.12);color:var(--warm);border-radius:4px;padding:1px 5px;font-size:10px;margin-right:2px;font-family:monospace}
.tag-sc{background:rgba(45,122,79,0.1);color:var(--ok)}

/* Progress */
.progress-label{font-size:13px;color:var(--warm);margin-bottom:8px;font-style:italic;min-height:18px}
.progress-bar{height:8px;background:var(--light);border-radius:4px;overflow:hidden}
.progress-fill{height:100%;border-radius:4px;background:linear-gradient(90deg,var(--gold),var(--gold2));transition:width 0.5s ease}

/* Live grid */
.live-grid{display:grid;grid-template-columns:repeat(4,1fr);gap:6px;margin-top:14px}
.live-cell{aspect-ratio:1;border-radius:8px;overflow:hidden;background:var(--light);border:1.5px solid var(--light);
  display:flex;align-items:center;justify-content:center;font-family:'Playfair Display',serif;font-size:10px;color:#bbb;position:relative;cursor:pointer;transition:border 0.2s}
.live-cell.done{border-color:var(--gold2)}
.live-cell.err{border-color:var(--err);color:var(--err);font-size:16px}
.live-cell.spin{border-color:var(--gold);animation:borderPulse 1.5s infinite}
.live-cell img{width:100%;height:100%;object-fit:cover;display:block}
.live-cell-num{position:absolute;bottom:2px;right:4px;font-size:9px;color:rgba(255,255,255,0.85);font-family:'Playfair Display',serif;font-weight:700;text-shadow:0 1px 3px rgba(0,0,0,0.8)}
@keyframes borderPulse{0%,100%{border-color:var(--gold)}50%{border-color:var(--gold2)}}

/* Viewer */
.viewer-wrap{background:var(--ink);border-radius:var(--r);overflow:hidden;margin-bottom:12px;box-shadow:var(--sh);position:relative}
.viewer-wrap img{width:100%;display:block;background:var(--ink);min-height:200px}
.viewer-badge{position:absolute;top:10px;left:10px;background:rgba(0,0,0,0.65);border-radius:16px;padding:3px 11px;font-size:11px;color:var(--gold2);font-family:'Playfair Display',serif;font-weight:700}
.viewer-speak{position:absolute;top:10px;right:10px;width:36px;height:36px;border-radius:50%;background:rgba(0,0,0,0.55);border:1px solid rgba(255,255,255,0.2);color:#fff;font-size:15px;cursor:pointer;display:flex;align-items:center;justify-content:center}
.viewer-text{padding:12px 16px 14px;font-size:15px;line-height:1.75;color:#c8b99a;font-style:italic;background:var(--ink);border-radius:0 0 var(--r) var(--r)}
.viewer-nav{display:flex;gap:10px;align-items:center;justify-content:center;margin:11px 0}
.nav-btn{width:46px;height:46px;border-radius:50%;border:1.5px solid var(--light);background:#fff;font-size:20px;cursor:pointer;display:flex;align-items:center;justify-content:center;box-shadow:var(--sh);transition:all 0.15s}
.nav-btn:disabled{opacity:0.25}
.nav-btn:active{transform:scale(0.92)}
.nav-counter{font-family:'Playfair Display',serif;font-size:14px;color:var(--muted);flex:1;text-align:center}
.strip{display:flex;gap:6px;overflow-x:auto;padding:3px 2px 10px;margin-bottom:13px;-webkit-overflow-scrolling:touch;scrollbar-width:none}
.strip::-webkit-scrollbar{display:none}
.strip-cell{flex-shrink:0;width:58px;cursor:pointer;border-radius:7px;overflow:hidden;border:2.5px solid transparent;transition:border 0.15s;background:var(--light)}
.strip-cell.active{border-color:var(--gold2)}
.strip-cell img{width:58px;height:58px;object-fit:cover;display:block}
.strip-num{text-align:center;font-size:10px;color:var(--muted);padding:2px 0 3px;font-family:'Playfair Display',serif}

/* Notices */
.notice{padding:10px 14px;border-radius:9px;font-size:13px;line-height:1.6;margin-bottom:12px}
.notice-warn{background:#fff8e6;border:1px solid #e8c84a;color:#7a5a00}
.notice-info{background:#f0f5ff;border:1px solid #b0c4f0;color:#2a3d6a}
.notice-ok  {background:#f0faf4;border:1px solid #7dd4a0;color:#1a4f30}
.notice-err {background:#fff0ee;border:1px solid #f0a090;color:#7a1a10}

/* Downloads */
.dl-grid{display:grid;grid-template-columns:1fr 1fr;gap:9px}
.dl-btn{padding:13px 9px;border-radius:11px;border:1.5px solid var(--light);background:var(--paper);text-align:center;cursor:pointer;transition:background 0.15s}
.dl-btn:active{background:var(--light)}
.dl-icon{font-size:20px;display:block;margin-bottom:3px}
.dl-label{font-size:11px;color:var(--muted);line-height:1.4}

/* Check rows */
.check-row{display:flex;justify-content:space-between;align-items:center;padding:8px 0;border-bottom:1px solid var(--light);font-size:13px}
.check-row:last-child{border-bottom:none}
.ok-t  {color:var(--ok);font-size:12px}
.warn-t{color:#b07800;font-size:12px}
.err-t {color:var(--err);font-size:12px}

.save-tip{background:var(--ink);color:#c8b99a;border-radius:var(--r);padding:14px 16px;margin-bottom:13px;font-size:13px;line-height:1.7}
.save-tip strong{color:var(--gold2)}
.video-status{font-size:13px;color:var(--warm);font-style:italic;margin-top:8px;min-height:16px}

/* Library */
.book-item{display:flex;align-items:center;gap:12px;padding:12px;background:var(--paper);border:1px solid var(--light);border-radius:9px;margin-bottom:8px;cursor:pointer;transition:border 0.15s}
.book-item:active{border-color:var(--gold2)}
.book-thumb-wrap{width:52px;height:52px;border-radius:7px;overflow:hidden;background:var(--light);flex-shrink:0;display:flex;align-items:center;justify-content:center;font-size:22px}
.book-thumb-wrap img{width:100%;height:100%;object-fit:cover}
.book-info{flex:1;min-width:0}
.book-title{font-family:'Playfair Display',serif;font-size:14px;font-weight:700;color:var(--ink);margin-bottom:2px}
.book-meta{font-size:11px;color:var(--muted)}
.book-status{font-size:10px;padding:2px 8px;border-radius:10px;font-family:'Playfair Display',serif;font-weight:700}
.book-status.done{background:rgba(45,122,79,0.12);color:var(--ok)}
.book-status.running{background:rgba(184,145,42,0.12);color:var(--gold)}
.book-status.error{background:rgba(192,57,43,0.1);color:var(--err)}

/* Auth modal */
.modal-overlay{position:fixed;inset:0;background:rgba(0,0,0,0.7);z-index:100;display:flex;align-items:flex-end}
.modal{background:var(--paper);border-radius:20px 20px 0 0;padding:28px 20px 40px;width:100%;max-width:500px;margin:0 auto}
.modal-title{font-family:'Playfair Display',serif;font-size:22px;font-weight:900;color:var(--ink);margin-bottom:20px;text-align:center}
.modal-tabs{display:flex;gap:0;margin-bottom:20px;border-bottom:2px solid var(--light)}
.modal-tab{flex:1;padding:10px;background:none;border:none;border-bottom:2px solid transparent;margin-bottom:-2px;font-family:'Lora',serif;font-size:14px;cursor:pointer;color:var(--muted);transition:all 0.2s}
.modal-tab.active{color:var(--gold2);border-bottom-color:var(--gold2)}
.modal-error{color:var(--err);font-size:13px;margin-bottom:12px;text-align:center}
</style>
</head>
<body>

<header class="hdr">
  <div class="hdr-eye">✦ AI Eventyrbok ✦</div>
  <h1 class="hdr-title">StoryBook AI</h1>
  <div class="hdr-row">
    <div class="status-pill chk" id="pill" onclick="updatePill()">
      <div class="pdot"></div>
      <span id="pillTxt">Sjekker…</span>
    </div>
    <button class="user-btn" id="userBtn" onclick="toggleAuth()">Logg inn</button>
  </div>
</header>

<nav class="tabs" id="tabs"></nav>
<main class="main" id="main"></main>

<!-- Auth modal -->
<div class="modal-overlay" id="authModal" style="display:none" onclick="if(event.target===this)hideAuth()">
  <div class="modal">
    <div class="modal-title">📚 Min konto</div>
    <div class="modal-tabs">
      <button class="modal-tab active" id="loginTab" onclick="switchAuthTab('login')">Logg inn</button>
      <button class="modal-tab" id="registerTab" onclick="switchAuthTab('register')">Opprett konto</button>
    </div>
    <div id="authError" class="modal-error" style="display:none"></div>
    <div id="loginForm">
      <label class="lbl">Brukernavn</label>
      <input type="text" id="loginUser" placeholder="brukernavn" style="margin-bottom:10px" autocomplete="username">
      <label class="lbl">Passord</label>
      <input type="password" id="loginPass" placeholder="passord" style="margin-bottom:16px" autocomplete="current-password">
      <button class="btn btn-primary" onclick="doLogin()">Logg inn</button>
    </div>
    <div id="registerForm" style="display:none">
      <label class="lbl">Brukernavn</label>
      <input type="text" id="regUser" placeholder="velg brukernavn" style="margin-bottom:10px" autocomplete="username">
      <label class="lbl">Passord</label>
      <input type="password" id="regPass" placeholder="minst 6 tegn" style="margin-bottom:16px" autocomplete="new-password">
      <button class="btn btn-primary" onclick="doRegister()">Opprett konto</button>
    </div>
    <button class="btn btn-secondary" style="margin-top:10px" onclick="hideAuth()">Avbryt</button>
  </div>
</div>

<script>
// ═══════════════════════════════════════════════════════
//  STATE
// ═══════════════════════════════════════════════════════
const S = {
  step: 0,
  // Auth
  token:    localStorage.getItem('sb_token')    || null,
  username: localStorage.getItem('sb_username') || null,
  // Config
  apiKey:       localStorage.getItem('oai_key')  || '',
  masterPrompt: localStorage.getItem('sb_master')|| '',
  // Characters & objects
  characters: [],
  objects:    [],
  // Story
  manus:       '',
  beskrivelse: '',
  bookTitle:   '',
  // Parse result (for preview only — server parses on generate)
  parsedPages: [],
  parseDebounce: null,
  // Job
  jobId:   localStorage.getItem('job_id') || null,
  jobData: null,
  polling: null,
  // Viewer
  curPage:     0,
  speaking:    false,
  rerunSet:    new Set(),
  videoStatus: '',
};

const STEPS = [
  {icon:'⚙️', label:'Oppsett'},
  {icon:'👤', label:'Karakterer'},
  {icon:'📖', label:'Manus'},
  {icon:'🎨', label:'Generer'},
  {icon:'📚', label:'Visning'},
];

function base() { return window.location.origin; }
function authHeaders() {
  const h = {};
  if (S.token) h['x-user-token'] = S.token;
  return h;
}

// ═══════════════════════════════════════════════════════
//  BACKEND CHECK
// ═══════════════════════════════════════════════════════
async function updatePill() {
  const pill=document.getElementById('pill'), txt=document.getElementById('pillTxt');
  try {
    const r = await fetch(base()+'/health', {signal: AbortSignal.timeout(5000)});
    const d = await r.json();
    if (d.ok) { pill.className='status-pill ok'; txt.textContent='Tilkoblet ✓'; return true; }
  } catch(_) {}
  pill.className='status-pill err'; txt.textContent='Ikke tilkoblet';
  return false;
}

// ═══════════════════════════════════════════════════════
//  AUTH
// ═══════════════════════════════════════════════════════
function toggleAuth() {
  if (S.token) {
    // Show logout option
    if (confirm(`Logget inn som ${S.username}.\n\nLogg ut?`)) {
      S.token=null; S.username=null;
      localStorage.removeItem('sb_token'); localStorage.removeItem('sb_username');
      updateUserBtn(); render();
    }
  } else {
    document.getElementById('authModal').style.display='flex';
  }
}

function hideAuth() { document.getElementById('authModal').style.display='none'; }

function switchAuthTab(tab) {
  document.getElementById('loginForm').style.display    = tab==='login'    ? '' : 'none';
  document.getElementById('registerForm').style.display = tab==='register' ? '' : 'none';
  document.getElementById('loginTab').className    = 'modal-tab'+(tab==='login'?' active':'');
  document.getElementById('registerTab').className = 'modal-tab'+(tab==='register'?' active':'');
  document.getElementById('authError').style.display = 'none';
}

function showAuthError(msg) {
  const el = document.getElementById('authError');
  el.textContent = msg; el.style.display='block';
}

async function doLogin() {
  const username = document.getElementById('loginUser').value.trim();
  const password = document.getElementById('loginPass').value;
  if (!username||!password) return showAuthError('Fyll inn begge feltene');
  try {
    const r = await fetch(base()+'/auth/login',{
      method:'POST', headers:{'Content-Type':'application/json'},
      body: JSON.stringify({username, password}),
    });
    const d = await r.json();
    if (d.error) return showAuthError(d.error);
    S.token=d.token; S.username=d.username;
    localStorage.setItem('sb_token',d.token); localStorage.setItem('sb_username',d.username);
    hideAuth(); updateUserBtn(); render();
  } catch(err) { showAuthError('Feil: '+err.message); }
}

async function doRegister() {
  const username = document.getElementById('regUser').value.trim();
  const password = document.getElementById('regPass').value;
  if (!username||!password) return showAuthError('Fyll inn begge feltene');
  try {
    const r = await fetch(base()+'/auth/register',{
      method:'POST', headers:{'Content-Type':'application/json'},
      body: JSON.stringify({username, password}),
    });
    const d = await r.json();
    if (d.error) return showAuthError(d.error);
    S.token=d.token; S.username=d.username;
    localStorage.setItem('sb_token',d.token); localStorage.setItem('sb_username',d.username);
    hideAuth(); updateUserBtn(); render();
  } catch(err) { showAuthError('Feil: '+err.message); }
}

function updateUserBtn() {
  const btn = document.getElementById('userBtn');
  if (!btn) return;
  btn.textContent = S.token ? `👤 ${S.username}` : 'Logg inn';
}

// ═══════════════════════════════════════════════════════
//  POLLING
// ═══════════════════════════════════════════════════════
function startPolling(jobId) {
  if (S.polling) clearInterval(S.polling);
  S.jobId = jobId;
  localStorage.setItem('job_id', jobId);
  S.polling = setInterval(async () => {
    await fetchJob(jobId);
    if (S.step===3) renderMain();
    if (S.jobData?.status==='done'||S.jobData?.status==='error') {
      clearInterval(S.polling); S.polling=null;
    }
  }, 4000);
}

async function fetchJob(jobId) {
  if (!jobId) return;
  try {
    const r = await fetch(base()+`/jobs/${jobId}`, {headers: authHeaders()});
    S.jobData = await r.json();
  } catch(_) {}
}

// ═══════════════════════════════════════════════════════
//  PARSE — debounced, auto-triggered
// ═══════════════════════════════════════════════════════
function triggerParse() {
  clearTimeout(S.parseDebounce);
  S.parseDebounce = setTimeout(doParse, 600);
}

async function doParse() {
  if (!S.manus.trim()) { S.parsedPages=[]; renderMain(); return; }
  try {
    const r = await fetch(base()+'/parse', {
      method:'POST',
      headers:{'Content-Type':'application/json'},
      body: JSON.stringify({
        manus: S.manus,
        beskrivelse: S.beskrivelse,
        characters: S.characters.map(c=>({id:c.id,name:c.name,description:c.description})),
        objects:    S.objects.map(o=>({id:o.id,name:o.name,description:o.description})),
      }),
    });
    const d = await r.json();
    S.parsedPages = d.pages || [];
  } catch(_) {
    // Client fallback
    S.parsedPages = S.manus.split(/(?=#p\d+)/i).filter(s=>s.trim()).map(sec=>{
      const lines=sec.trim().split('\n').map(l=>l.trim()).filter(Boolean);
      const pm=lines[0]?.match(/#p(\d+)/i);
      if(!pm) return null;
      return {pageNum:parseInt(pm[1]),storyText:lines.slice(1).join(' ').trim(),charRefs:[],objRefs:[],scene:'',visualDesc:''};
    }).filter(Boolean);
  }
  // Re-render only the preview table if on manus step
  if (S.step===2) {
    const previewEl = document.getElementById('previewTable');
    if (previewEl) {
      previewEl.innerHTML = renderPreviewRows();
    } else {
      renderMain();
    }
  }
}

function renderPreviewRows() {
  return S.parsedPages.map(p=>`
    <tr>
      <td>#p${String(p.pageNum).padStart(3,'0')}</td>
      <td>${p.charRefs.map(r=>`<span class="tag">#c${r}</span>`).join('')}${p.objRefs.map(r=>`<span class="tag">#o${r}</span>`).join('')||'—'}</td>
      <td><span class="tag tag-sc">${esc((p.scene||'').slice(0,25))||'—'}</span></td>
      <td>${esc((p.visualDesc||p.suggestedVisual||'').slice(0,45))}…</td>
    </tr>`).join('');
}

// ═══════════════════════════════════════════════════════
//  START JOB
// ═══════════════════════════════════════════════════════
async function startJob() {
  if (!S.parsedPages.length) {
    alert('Ingen sider funnet. Sjekk at manus har #p001, #p002 osv.');
    return;
  }
  const cost = (S.parsedPages.length * 0.065).toFixed(2);
  if (!confirm(`Generere ${S.parsedPages.length} bilder?\nEstimert kostnad: $${cost}\n\nJobben kjører i bakgrunnen.`)) return;

  const form = new FormData();
  form.append('openaiKey',    S.apiKey);
  form.append('masterPrompt', S.masterPrompt);
  form.append('manus',        S.manus);
  form.append('beskrivelse',  S.beskrivelse);
  form.append('title',        S.bookTitle || `Bok ${new Date().toLocaleDateString('nb-NO')}`);

  // Only send id/name/description — NO dataUrl, NO pagesJson
  form.append('characters', JSON.stringify(S.characters.map(c=>({id:c.id,name:c.name,description:c.description}))));
  form.append('objects',    JSON.stringify(S.objects.map(o=>({id:o.id,name:o.name,description:o.description}))));

  // Attach images as files
  for (const c of S.characters) {
    if (c.dataUrl) {
      form.append('charImages', dataUrlToBlob(c.dataUrl), `c${c.id}_${c.name}.png`);
    }
  }
  for (const o of S.objects) {
    if (o.dataUrl) {
      form.append('objImages', dataUrlToBlob(o.dataUrl), `o${o.id}_${o.name}.png`);
    }
  }

  try {
    const r = await fetch(base()+'/jobs', {
      method: 'POST',
      headers: authHeaders(),
      body: form,
    });
    const d = await r.json();
    if (d.error) { alert('Feil: '+d.error); return; }
    startPolling(d.jobId);
    S.step=3; render();
  } catch(err) { alert('Feil ved oppstart: '+err.message); }
}

async function rerunPages() {
  if (!S.jobId||!S.rerunSet.size) return;
  const nums=[...S.rerunSet];
  if (!confirm(`Kjør side ${nums.join(', ')} på nytt?`)) return;
  try {
    await fetch(base()+`/jobs/${S.jobId}/rerun`,{
      method:'POST', headers:{'Content-Type':'application/json',...authHeaders()},
      body:JSON.stringify({pageNums:nums}),
    });
    S.rerunSet.clear(); startPolling(S.jobId); render();
  } catch(err) { alert('Feil: '+err.message); }
}

function speak(text) {
  if (S.speaking) { speechSynthesis.cancel(); S.speaking=false; render(); return; }
  const u=new SpeechSynthesisUtterance(text);
  u.lang='nb-NO'; u.rate=0.88; u.pitch=1.05;
  u.onend=()=>{S.speaking=false;render();};
  S.speaking=true; render();
  speechSynthesis.speak(u);
}

// ═══════════════════════════════════════════════════════
//  VIDEO
// ═══════════════════════════════════════════════════════
async function makeVideo(withSpeech) {
  const results=Object.values(S.jobData?.results||{}).filter(r=>r.status==='done').sort((a,b)=>a.pageNum-b.pageNum);
  if (!results.length) return;
  S.videoStatus='Laster bilder…'; renderMain();

  const imgs=await Promise.all(results.map(r=>new Promise(res=>{
    const img=new Image(); img.crossOrigin='anonymous';
    img.onload=()=>res(img); img.onerror=()=>res(null);
    img.src=imgUrl(S.jobId,r.pageNum);
  })));

  S.videoStatus='Starter opptak…'; renderMain();
  const canvas=document.createElement('canvas'); canvas.width=1024; canvas.height=1024;
  const ctx=canvas.getContext('2d');
  const stream=canvas.captureStream(1);
  const mime=MediaRecorder.isTypeSupported('video/webm;codecs=vp9')?'video/webm;codecs=vp9':'video/webm';
  const rec=new MediaRecorder(stream,{mimeType:mime});
  const chunks=[];
  rec.ondataavailable=e=>e.data.size&&chunks.push(e.data);
  rec.onstop=()=>{
    const blob=new Blob(chunks,{type:'video/webm'});
    const a=document.createElement('a'); a.href=URL.createObjectURL(blob); a.download='eventyrbok.webm'; a.click();
    S.videoStatus='Video klar! ✓'; renderMain();
    setTimeout(()=>{S.videoStatus='';renderMain();},3000);
  };
  rec.start();

  for(let i=0;i<results.length;i++){
    const r=results[i], img=imgs[i];
    S.videoStatus=`Side ${r.pageNum} av ${results.length}…`; renderMain();
    ctx.clearRect(0,0,1024,1024);
    if(img) ctx.drawImage(img,0,0,1024,1024);
    else { ctx.fillStyle='#1a1520'; ctx.fillRect(0,0,1024,1024); }
    // Text overlay
    const g=ctx.createLinearGradient(0,700,0,1024);
    g.addColorStop(0,'rgba(0,0,0,0)'); g.addColorStop(0.3,'rgba(0,0,0,0.65)'); g.addColorStop(1,'rgba(0,0,0,0.9)');
    ctx.fillStyle=g; ctx.fillRect(0,700,1024,324);
    ctx.fillStyle='rgba(184,145,42,0.92)';
    ctx.beginPath(); ctx.roundRect(22,984,62,26,13); ctx.fill();
    ctx.fillStyle='#fff'; ctx.font='bold 13px Georgia,serif'; ctx.textAlign='center';
    ctx.fillText(`${r.pageNum}/${results.length}`,53,1001);
    ctx.font='22px Georgia,serif'; ctx.shadowColor='rgba(0,0,0,0.85)'; ctx.shadowBlur=6;
    const words=(r.storyText||'').split(' '),lines=[];let line='';
    for(const w of words){const t=line+w+' ';if(ctx.measureText(t).width>950&&line){lines.push(line.trim());line=w+' ';}else line=t;}
    if(line.trim())lines.push(line.trim());
    const shown=lines.slice(0,5),sy=752+Math.max(0,(5-shown.length)*17);
    shown.forEach((l,li)=>ctx.fillText(l,512,sy+li*34));

    if(withSpeech&&r.storyText){
      await new Promise(res=>{
        const u=new SpeechSynthesisUtterance(r.storyText);
        u.lang='nb-NO'; u.rate=0.88; u.onend=res; u.onerror=res;
        speechSynthesis.speak(u);
        setTimeout(res,10000);
      });
    } else {
      await new Promise(res=>setTimeout(res,3500));
    }
  }
  rec.stop();
}

// ═══════════════════════════════════════════════════════
//  DOWNLOAD ZIP
// ═══════════════════════════════════════════════════════
async function dlZip() {
  if(!window.JSZip){
    const s=document.createElement('script');
    s.src='https://cdnjs.cloudflare.com/ajax/libs/jszip/3.10.1/jszip.min.js';
    await new Promise(res=>{s.onload=res;document.head.appendChild(s);});
  }
  const results=Object.values(S.jobData?.results||{}).filter(r=>r.status==='done').sort((a,b)=>a.pageNum-b.pageNum);
  const zip=new window.JSZip(), folder=zip.folder('eventyrbok');
  folder.file('historien.txt',results.map(r=>`Side ${r.pageNum}:\n${r.storyText}`).join('\n\n---\n\n'));
  S.videoStatus='Pakker bilder…'; renderMain();
  for(const r of results){
    try{
      const resp=await fetch(imgUrl(S.jobId,r.pageNum));
      folder.file(`side_${String(r.pageNum).padStart(2,'0')}.png`,await resp.arrayBuffer());
    }catch(_){}
  }
  const blob=await zip.generateAsync({type:'blob',compression:'DEFLATE',compressionOptions:{level:6}});
  const a=document.createElement('a'); a.href=URL.createObjectURL(blob); a.download='eventyrbok.zip'; a.click();
  S.videoStatus=''; renderMain();
}

// ═══════════════════════════════════════════════════════
//  HELPERS
// ═══════════════════════════════════════════════════════
function imgUrl(jobId,pageNum){ return base()+`/image/${jobId}/${pageNum}?t=${Date.now()}`; }

function dataUrlToBlob(dataUrl){
  const [h,d]=dataUrl.split(','),mime=h.match(/:(.*?);/)[1];
  const bin=atob(d),arr=new Uint8Array(bin.length);
  for(let i=0;i<bin.length;i++) arr[i]=bin.charCodeAt(i);
  return new Blob([arr],{type:mime});
}

function addImages(files, arr, prefix){
  const readers=Array.from(files).map(f=>new Promise(res=>{
    const r=new FileReader(); r.onload=()=>res({name:f.name,dataUrl:r.result}); r.readAsDataURL(f);
  }));
  Promise.all(readers).then(imgs=>{
    imgs.forEach((img,i)=>{
      const id=String(arr.length+i+1).padStart(2,'0');
      arr.push({id,name:`${prefix}${id}`,description:'',dataUrl:img.dataUrl});
    });
    render();
  });
}

function esc(s){return String(s||'').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;').replace(/'/g,'&#39;');}
function timeAgo(ts){if(!ts)return'';const m=Math.floor((Date.now()-ts)/60000);if(m<1)return'nettopp';if(m<60)return m+'m siden';return Math.floor(m/60)+'t siden';}

  attachEvents();
}

// ── Step 3: Generate ───────────────────────────────────
function renderGenerate(){
  const job=S.jobData;
  const results=job?Object.values(job.results||{}).sort((a,b)=>a.pageNum-b.pageNum):[];
  const done=results.filter(r=>r.status==='done').length;
  const total=job?.pageCount||S.parsedPages.length||0;
  const pct=total>0?Math.round((job?.progress||0)/total*100):0;
  const running=job?.status==='running'||job?.status==='queued';

  if(!job) return `
  <div class="card">
    <div class="card-title">Sjekkliste</div>
    ${chk('OpenAI nøkkel', !!S.apiKey,           S.apiKey?'Klar':'Mangler')}
    ${chk('Masterprompt',  !!S.masterPrompt,      S.masterPrompt?'Klar':'Standard brukes')}
    ${chk('Karakterer',    S.characters.length>0, S.characters.length+' karakterer', S.characters.length===0)}
    ${chk('Manus',         S.parsedPages.length>0,S.parsedPages.length+' sider',     S.parsedPages.length===0)}
  </div>
  <div class="notice notice-info">
    💡 Jobben kjører i bakgrunnen. Du kan <strong>lukke appen</strong> og komme tilbake.
  </div>
  <button class="btn btn-primary" ${!S.apiKey||!S.parsedPages.length?'disabled':''} onclick="startJob()">
    🎨 Start — ${S.parsedPages.length} bilder (~$${(S.parsedPages.length*0.065).toFixed(2)})
  </button>
  <button class="btn btn-secondary" style="margin-top:9px" onclick="S.step=2;render()">← Tilbake</button>`;

  const cells=Array.from({length:total},(_,i)=>{
    const pn=i+1, r=results.find(x=>x.pageNum===pn);
    if(!r) return `<div class="live-cell ${running&&i<(job?.progress||0)?'spin':''}">${pn}</div>`;
    if(r.status==='error') return `
      <div class="live-cell err" onclick="S.rerunSet.has(${pn})?S.rerunSet.delete(${pn}):S.rerunSet.add(${pn});render()">
        ✗<div class="live-cell-num">${pn}</div>
      </div>`;
    return `
      <div class="live-cell done" onclick="S.curPage=${i};S.step=4;render()">
        <img src="${imgUrl(S.jobId,pn)}" loading="lazy">
        <div class="live-cell-num">${pn}</div>
      </div>`;
  }).join('');

  return `
  <div class="card">
    <div class="card-title">${running?'🎨 Genererer…':job.status==='done'?'✅ Ferdig!':'⚠️ Stoppet'}</div>
    ${running?`
    <div class="progress-label">${done} av ${total} bilder ferdig</div>
    <div class="progress-bar"><div class="progress-fill" style="width:${pct}%"></div></div>
    <p class="hint" style="text-align:right;margin-top:5px">Oppdateres automatisk · ${timeAgo(job.createdAt)}</p>`
    :`<p style="font-size:13px;color:var(--muted);margin-bottom:11px">${done} av ${total} generert · ${timeAgo(job.completedAt)}</p>`}
    <div class="live-grid">${cells}</div>
  </div>
  ${S.rerunSet.size?`<div class="notice notice-warn">${S.rerunSet.size} side(r) valgt for ny generering
    <br><button class="btn btn-ghost btn-small" style="margin-top:7px" onclick="rerunPages()">↻ Kjør på nytt</button>
  </div>`:''}
  ${done>0?`<button class="btn btn-primary" onclick="S.step=4;render()">Se bilder →</button>`:''}
  <button class="btn btn-secondary" style="margin-top:9px"
    onclick="S.jobId=null;S.jobData=null;localStorage.removeItem('job_id');if(S.polling)clearInterval(S.polling);render()">
    + Ny jobb
  </button>`; }

function chk(l,ok,d,w=false){ return `<div class="check-row"><span>${l}</span><span class="${ok?'ok-t':w?'warn-t':'err-t'}">${ok?'✓':w?'⚠':'✗'} ${d}</span></div>`; }

// ── Step 4: Viewer ─────────────────────────────────────
function renderViewer(){
  const results=Object.values(S.jobData?.results||{}).filter(r=>r.status==='done').sort((a,b)=>a.pageNum-b.pageNum);
  if(!results.length) return `<div class="notice notice-warn">Ingen bilder ennå.</div>
    <button class="btn btn-primary" onclick="S.step=3;render()">← Tilbake</button>`;
  const cur=results[S.curPage]||results[0];

  return `
  <div class="viewer-wrap">
    <img src="${imgUrl(S.jobId,cur.pageNum)}" loading="lazy">
    <div class="viewer-badge">${cur.pageNum} / ${S.jobData.pageCount}</div>
    <button class="viewer-speak" onclick="speak(${JSON.stringify(cur.storyText||'').replace(/</g,'\\x3c')})">${S.speaking?'⏹':'🔊'}</button>
  </div>
  <div class="viewer-text">${esc(cur.storyText)}</div>

  <div class="viewer-nav">
    <button class="nav-btn" ${S.curPage<=0?'disabled':''} onclick="S.curPage--;render()">‹</button>
    <div class="nav-counter">${S.curPage+1} av ${results.length}</div>
    <button class="nav-btn" ${S.curPage>=results.length-1?'disabled':''} onclick="S.curPage++;render()">›</button>
  </div>

  <div class="strip" id="strip">
    ${results.map((r,i)=>`
      <div class="strip-cell ${i===S.curPage?'active':''}" onclick="S.curPage=${i};render()">
        <img src="${imgUrl(S.jobId,r.pageNum)}" loading="lazy">
        <div class="strip-num">${r.pageNum}</div>
      </div>`).join('')}
  </div>

  <div class="save-tip">📱 <strong>Lagre:</strong> Trykk og hold på bildet → «Legg til i Bilder»</div>

  <div class="card">
    <div class="card-title">📦 Last ned & eksporter</div>
    <div class="dl-grid">
      <div class="dl-btn" onclick="dlZip()">
        <span class="dl-icon">📦</span><span class="dl-label">Alle bilder<br>som ZIP</span>
      </div>
      <div class="dl-btn" onclick="makeVideo(false)">
        <span class="dl-icon">🎬</span><span class="dl-label">Video<br>slideshow</span>
      </div>
      <div class="dl-btn" onclick="makeVideo(true)">
        <span class="dl-icon">🎬🔊</span><span class="dl-label">Video med<br>fortellerstemme</span>
      </div>
      <div class="dl-btn" onclick="speak(results.map(r=>r.storyText).join('. '))">
        <span class="dl-icon">${S.speaking?'⏹':'🎙'}</span><span class="dl-label">${S.speaking?'Stopp':'Les opp'}<br>hele boken</span>
      </div>
    </div>
    ${S.videoStatus?`<div class="video-status">⏳ ${esc(S.videoStatus)}</div>`:''}
  </div>

  <div class="btn-row">
    <button class="btn btn-secondary" onclick="S.step=3;render()">← Oversikt</button>
    <button class="btn btn-ghost" onclick="S.jobId=null;S.jobData=null;localStorage.removeItem('job_id');if(S.polling)clearInterval(S.polling);S.step=0;render()">+ Ny bok</button>
  </div>`; }

// ═══════════════════════════════════════════════════════
//  EVENTS
// ═══════════════════════════════════════════════════════
function attachEvents(){
  const cf=document.getElementById('charFile');
  if(cf) cf.addEventListener('change',e=>addImages(e.target.files,S.characters,'c'));
  const of=document.getElementById('objFile');
  if(of) of.addEventListener('change',e=>addImages(e.target.files,S.objects,'o'));
  const strip=document.getElementById('strip');
  if(strip){const a=strip.querySelector('.strip-cell.active');if(a)a.scrollIntoView({behavior:'smooth',block:'nearest',inline:'center'});}
}

// ═══════════════════════════════════════════════════════
//  BOOT
// ═══════════════════════════════════════════════════════
render();
updatePill();
updateUserBtn();

if(S.jobId){
  fetchJob(S.jobId).then(()=>{
    if(S.jobData?.status==='running'||S.jobData?.status==='queued') startPolling(S.jobId);
    render();
  });
}
</script>
</body>
</html>
