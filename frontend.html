<!DOCTYPE html>
<html lang="no">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1,maximum-scale=1,user-scalable=no">
<meta name="apple-mobile-web-app-capable" content="yes">
<title>StoryBook AI</title>
<link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@700;900&family=Lora:ital,wght@0,400;0,500;1,400&display=swap" rel="stylesheet">
<style>
:root{--ink:#1a1520;--paper:#faf6ef;--gold:#b8912a;--gold2:#d4a843;--warm:#8b6914;--muted:#7a6e5a;--light:#ede5d4;--err:#c0392b;--ok:#2d7a4f;--r:13px;--sh:0 3px 20px rgba(0,0,0,.09)}
*{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent}
body{background:var(--paper);color:var(--ink);font-family:'Lora',Georgia,serif;min-height:100vh}
.hdr{background:var(--ink);text-align:center;padding:20px 20px 14px;position:relative;overflow:hidden}
.hdr::before{content:'';position:absolute;inset:0;background:radial-gradient(ellipse at 50% 130%,rgba(184,145,42,.18) 0%,transparent 65%)}
.hdr-eye{font-size:10px;letter-spacing:5px;color:var(--gold);text-transform:uppercase;margin-bottom:5px;position:relative}
.hdr-title{font-family:'Playfair Display',serif;font-size:clamp(24px,6vw,42px);font-weight:900;line-height:1;position:relative;background:linear-gradient(135deg,#f0d878,var(--gold2),#c9922a,#f0d878);background-size:300% 100%;-webkit-background-clip:text;-webkit-text-fill-color:transparent;animation:shimmer 5s linear infinite}
.hdr-row{display:flex;align-items:center;justify-content:center;gap:10px;margin-top:8px;position:relative;flex-wrap:wrap}
.pill{display:inline-flex;align-items:center;gap:5px;padding:4px 12px;border-radius:16px;font-size:11px;border:1px solid;cursor:pointer}
.pill.ok{background:rgba(45,122,79,.15);border-color:rgba(45,122,79,.4);color:#2d7a4f}
.pill.err{background:rgba(192,57,43,.12);border-color:rgba(192,57,43,.35);color:#c0392b}
.pill.chk{background:rgba(255,255,255,.05);border-color:rgba(255,255,255,.1);color:#4a4060}
.pdot{width:6px;height:6px;border-radius:50%;background:currentColor;animation:pulse 2s infinite}
.lib-btn{background:rgba(184,145,42,.15);border:1px solid rgba(184,145,42,.3);border-radius:16px;color:var(--gold2);font-size:11px;padding:4px 12px;cursor:pointer}
@keyframes shimmer{0%{background-position:0%}100%{background-position:300%}}
@keyframes pulse{0%,100%{opacity:1}50%{opacity:.35}}
@keyframes spin{0%{border-top-color:var(--gold)}50%{border-top-color:var(--gold2)}100%{border-top-color:var(--gold)}}
.tabs{display:flex;background:var(--ink);border-bottom:1px solid rgba(184,145,42,.18);overflow-x:auto;scrollbar-width:none}
.tabs::-webkit-scrollbar{display:none}
.tab{flex:1;min-width:50px;padding:10px 3px 8px;background:none;border:none;border-bottom:2.5px solid transparent;color:#3a3030;font-size:9.5px;font-family:'Lora',serif;cursor:pointer;text-align:center;white-space:nowrap}
.tab.active{color:var(--gold2);border-bottom-color:var(--gold2)}.tab.done{color:#5a4a30}
.tab-icon{display:block;font-size:15px;margin-bottom:2px}
.main{max-width:640px;margin:0 auto;padding:16px 13px 80px}
.card{background:#fff;border:1px solid var(--light);border-radius:var(--r);padding:16px;margin-bottom:13px;box-shadow:var(--sh)}
.card-title{font-family:'Playfair Display',serif;font-size:11px;font-weight:700;letter-spacing:1.2px;color:var(--gold);text-transform:uppercase;margin-bottom:12px}
.lbl{display:block;font-size:13px;color:var(--warm);margin-bottom:4px;font-weight:500}
.hint{font-size:11.5px;color:var(--muted);font-style:italic;margin-top:4px;line-height:1.5}
input,textarea{width:100%;padding:10px 12px;background:var(--paper);border:1.5px solid var(--light);border-radius:9px;color:var(--ink);font-family:'Lora',serif;font-size:14px;outline:none;-webkit-appearance:none}
input:focus,textarea:focus{border-color:var(--gold2)}
textarea{resize:vertical;line-height:1.7}.mono{font-family:'Courier New',monospace;font-size:12px;line-height:1.6}
.two-col{display:grid;grid-template-columns:1fr 1fr;gap:10px}
.btn{display:inline-flex;align-items:center;justify-content:center;gap:7px;padding:11px 17px;border-radius:24px;border:none;font-family:'Playfair Display',serif;font-size:13px;font-weight:700;cursor:pointer;width:100%;-webkit-appearance:none}
.btn:active{transform:scale(.97)}
.btn-p{background:linear-gradient(135deg,var(--gold),var(--gold2));color:#fff;font-size:14px;padding:14px;box-shadow:0 4px 16px rgba(184,145,42,.28)}
.btn-p:disabled{opacity:.38;cursor:not-allowed;transform:none}
.btn-s{background:transparent;border:1.5px solid var(--light);color:var(--muted)}
.btn-g{background:transparent;border:1.5px solid var(--gold);color:var(--gold)}
.btn-d{background:rgba(192,57,43,.1);border:1.5px solid rgba(192,57,43,.4);color:var(--err)}
.btn-stop{background:rgba(200,100,0,.1);border:1.5px solid rgba(200,100,0,.4);color:#c86400}
.btn-sm{padding:6px 13px;font-size:11px;border-radius:17px;width:auto}
.btn-row{display:flex;gap:8px}.btn-row .btn{flex:1}
.char-item{display:flex;gap:9px;align-items:flex-start;padding:11px;background:var(--paper);border:1px solid var(--light);border-radius:9px;margin-bottom:8px}
.char-img{width:46px;height:46px;border-radius:7px;object-fit:cover;border:2px solid var(--light);flex-shrink:0}
.char-ph{width:46px;height:46px;border-radius:7px;background:var(--light);display:flex;align-items:center;justify-content:center;font-size:18px;flex-shrink:0}
.char-info{flex:1;min-width:0}
.char-id{font-size:10px;color:var(--gold);font-family:'Playfair Display',serif;font-weight:700;letter-spacing:1px;margin-bottom:2px}
.tag{display:inline-block;background:rgba(184,145,42,.12);color:var(--warm);border-radius:4px;padding:1px 5px;font-size:10px;margin:1px;font-family:monospace}
.tag-g{background:rgba(45,122,79,.1);color:var(--ok)}.tag-b{background:rgba(60,80,180,.1);color:#3050b0}.tag-v{background:rgba(140,50,180,.1);color:#8c32b4}
.pt{width:100%;border-collapse:collapse;font-size:11px}
.pt th{text-align:left;padding:5px 6px;color:var(--gold);font-family:'Playfair Display',serif;font-size:9px;letter-spacing:1px;text-transform:uppercase;border-bottom:1px solid var(--light)}
.pt td{padding:5px 6px;border-bottom:1px solid var(--light);vertical-align:top;color:var(--muted);line-height:1.4}
.pt td:first-child{color:var(--gold);font-family:'Playfair Display',serif;font-weight:700;white-space:nowrap}
.pt tr:last-child td{border-bottom:none}
.pbar-w{height:7px;background:var(--light);border-radius:4px;overflow:hidden}
.pbar{height:100%;border-radius:4px;background:linear-gradient(90deg,var(--gold),var(--gold2));transition:width .5s}
.grid{display:grid;grid-template-columns:repeat(4,1fr);gap:5px;margin-top:12px}
.cell{aspect-ratio:1;border-radius:7px;overflow:hidden;background:var(--light);border:1.5px solid var(--light);display:flex;align-items:center;justify-content:center;font-size:10px;color:#bbb;position:relative;cursor:pointer}
.cell.done{border-color:var(--gold2)}.cell.err{border-color:var(--err);color:var(--err);font-size:16px}
.cell.spin{border-color:var(--gold);animation:spin 1.5s infinite}
.cell img{width:100%;height:100%;object-fit:cover;display:block}
.cell-n{position:absolute;bottom:2px;right:4px;font-size:9px;color:rgba(255,255,255,.9);font-weight:700;text-shadow:0 1px 3px rgba(0,0,0,.8)}
.vwrap{background:var(--ink);border-radius:var(--r);overflow:hidden;margin-bottom:11px;box-shadow:var(--sh);position:relative}
.vwrap img{width:100%;display:block;background:var(--ink);min-height:200px}
.vbadge{position:absolute;top:10px;left:10px;background:rgba(0,0,0,.65);border-radius:16px;padding:3px 10px;font-size:11px;color:var(--gold2);font-family:'Playfair Display',serif;font-weight:700}
.vspeak{position:absolute;top:10px;right:10px;width:34px;height:34px;border-radius:50%;background:rgba(0,0,0,.55);border:1px solid rgba(255,255,255,.2);color:#fff;font-size:14px;cursor:pointer;display:flex;align-items:center;justify-content:center}
.vtxt{padding:11px 15px 13px;font-size:14px;line-height:1.75;color:#c8b99a;font-style:italic;background:var(--ink);border-radius:0 0 var(--r) var(--r)}
.vnav{display:flex;gap:10px;align-items:center;justify-content:center;margin:10px 0}
.nav-btn{width:44px;height:44px;border-radius:50%;border:1.5px solid var(--light);background:#fff;font-size:19px;cursor:pointer;display:flex;align-items:center;justify-content:center;box-shadow:var(--sh)}
.nav-btn:disabled{opacity:.25}
.nc{font-family:'Playfair Display',serif;font-size:13px;color:var(--muted);flex:1;text-align:center}
.strip{display:flex;gap:5px;overflow-x:auto;padding:3px 0 9px;margin-bottom:12px;scrollbar-width:none}
.strip::-webkit-scrollbar{display:none}
.sc{flex-shrink:0;width:54px;cursor:pointer;border-radius:7px;overflow:hidden;border:2.5px solid transparent}
.sc.active{border-color:var(--gold2)}
.sc img{width:54px;height:54px;object-fit:cover;display:block}
.sc-n{text-align:center;font-size:9px;color:var(--muted);padding:2px 0}
.notice{padding:10px 14px;border-radius:9px;font-size:13px;line-height:1.6;margin-bottom:12px}
.nw{background:#fff8e6;border:1px solid #e8c84a;color:#7a5a00}
.ni{background:#f0f5ff;border:1px solid #b0c4f0;color:#2a3d6a}
.ne{background:#fff0ee;border:1px solid #f0a090;color:#7a1a10}
.dl-grid{display:grid;grid-template-columns:1fr 1fr;gap:8px}
.dlb{padding:12px 8px;border-radius:10px;border:1.5px solid var(--light);background:var(--paper);text-align:center;cursor:pointer}
.dlb:active{background:var(--light)}
.dli{font-size:18px;display:block;margin-bottom:3px}
.dll{font-size:11px;color:var(--muted);line-height:1.4}
.crow{display:flex;justify-content:space-between;align-items:center;padding:7px 0;border-bottom:1px solid var(--light);font-size:13px}
.crow:last-child{border-bottom:none}
.ok-t{color:var(--ok);font-size:11px}.wt{color:#b07800;font-size:11px}.et{color:var(--err);font-size:11px}
.stip{background:var(--ink);color:#c8b99a;border-radius:var(--r);padding:13px 15px;margin-bottom:12px;font-size:12px;line-height:1.7}
.stip strong{color:var(--gold2)}
.vstatus{font-size:12px;color:var(--warm);font-style:italic;margin-top:7px;min-height:16px}
.proj-item{background:#fff;border:1px solid var(--light);border-radius:var(--r);padding:14px;margin-bottom:10px}
.proj-hdr{display:flex;gap:10px;margin-bottom:10px}
.proj-ico{width:50px;height:50px;border-radius:8px;background:var(--light);flex-shrink:0;display:flex;align-items:center;justify-content:center;font-size:20px}
.proj-m{flex:1;min-width:0}
.proj-t{font-family:'Playfair Display',serif;font-size:14px;font-weight:700;color:var(--ink);margin-bottom:2px;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.proj-i{font-size:11px;color:var(--muted);line-height:1.5}
.pbadge{display:inline-block;padding:2px 8px;border-radius:10px;font-size:10px;font-family:'Playfair Display',serif;font-weight:700;margin-left:5px}
.bd{background:rgba(45,122,79,.12);color:var(--ok)}.br{background:rgba(184,145,42,.12);color:var(--gold)}.bs{background:rgba(100,100,100,.1);color:#666}.be{background:rgba(192,57,43,.1);color:var(--err)}.bdr{background:rgba(100,100,180,.1);color:#4a4ab0}
.prow{height:4px;background:var(--light);border-radius:2px;overflow:hidden;margin:5px 0}
.prowf{height:100%;border-radius:2px;background:linear-gradient(90deg,var(--gold),var(--gold2))}
.pacts{display:flex;gap:6px;flex-wrap:wrap}
.warn-line{padding:5px 10px;border-left:3px solid #e8c84a;background:#fff8e6;border-radius:0 6px 6px 0;margin-bottom:5px;font-size:12px;color:#7a5a00}
.port-line{padding:5px 10px;border-left:3px solid #b090d0;background:#f8f0ff;border-radius:0 6px 6px 0;margin-bottom:5px;font-size:12px;color:#6a3a9a}
.ov{position:fixed;inset:0;background:rgba(0,0,0,.7);z-index:100;display:flex;align-items:flex-end}
.modal{background:var(--paper);border-radius:20px 20px 0 0;padding:24px 18px 36px;width:100%;max-width:520px;margin:0 auto;max-height:85vh;overflow-y:auto}
.modal-t{font-family:'Playfair Display',serif;font-size:20px;font-weight:900;color:var(--ink);margin-bottom:16px;text-align:center}
input[type=password]{-webkit-appearance:none}
</style>
</head>
<body>
<header class="hdr">
  <div class="hdr-eye">✦ AI Eventyrbok ✦</div>
  <h1 class="hdr-title">StoryBook AI</h1>
  <div class="hdr-row">
    <div class="pill chk" id="pill" onclick="checkHealth()"><div class="pdot"></div><span id="pillTxt">Sjekker…</span></div>
    <button class="lib-btn" onclick="showLibrary()">📚 Prosjekter</button>
  </div>
</header>
<nav class="tabs" id="tabs"></nav>
<main class="main" id="main"></main>

<script>
// ── State ──────────────────────────────────────────────────────
var S = {
  step: 0,
  apiKey: localStorage.getItem('oai_key') || '',
  masterPrompt: localStorage.getItem('sb_master') || '',
  bookTitle: '',
  chars: [], objs: [],
  world: {wn:'',loc:'',lm:'',season:'',weather:'',noenv:''},
  manus: '', besk: '',
  pages: [], warnings: [], portraits: [],
  debounce: null,
  projId: localStorage.getItem('proj_id') || null,
  proj: null,
  poll: null,
  cur: 0, speaking: false, rerun: {},
  vstatus: ''
};

var STEPS = ['⚙️ Oppsett','👤 Karakterer','🌍 Verden','📖 Manus','🎨 Generer','📚 Visning'];

function base() { return window.location.origin; }
function h(s) { return String(s||'').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;'); }
function ago(ts) { if(!ts)return''; var m=Math.floor((Date.now()-ts)/60000); return m<1?'nettopp':m<60?m+'m siden':Math.floor(m/60)+'t siden'; }

// ── Health ─────────────────────────────────────────────────────
async function checkHealth() {
  var p=document.getElementById('pill'), t=document.getElementById('pillTxt');
  try {
    var r = await fetch(base()+'/health', {signal:AbortSignal.timeout(5000)});
    var d = await r.json();
    if(d.ok) { p.className='pill ok'; t.textContent='Tilkoblet ✓'; return; }
  } catch(e) {}
  p.className='pill err'; t.textContent='Ikke tilkoblet';
}

// ── Library ────────────────────────────────────────────────────
async function showLibrary() {
  try {
    var r = await fetch(base()+'/projects');
    var d = await r.json();
    buildLibModal(d.projects||[]);
  } catch(e) { alert('Feil: '+e.message); }
}

function pbadge(s) {
  var m = {done:'bd ✅',running:'br 🎨',queued:'br ⏳',stopped:'bs ⏹',error:'be ⚠️',draft:'bdr 📝'};
  var v = (m[s]||'bdr '+s).split(' ');
  return '<span class="pbadge '+v[0]+'">'+v.slice(1).join(' ')+'</span>';
}

function buildLibModal(ps) {
  var el = document.getElementById('libMod');
  if(el) el.remove();
  var ov = document.createElement('div');
  ov.id = 'libMod'; ov.className = 'ov';
  ov.onclick = function(e){ if(e.target===ov) ov.remove(); };

  var inner = '<div class="modal"><div class="modal-t">📚 Prosjekter</div>';

  if(!ps.length) {
    inner += '<p style="color:var(--muted);text-align:center;padding:20px;font-style:italic">Ingen prosjekter ennå</p>';
  } else {
    for(var i=0; i<ps.length; i++) {
      var p = ps[i];
      var pct = p.total>0 ? Math.round((p.progress||0)/p.total*100) : 0;
      var run = p.status==='running'||p.status==='queued';
      inner += '<div class="proj-item">';
      inner += '<div class="proj-hdr"><div class="proj-ico">📖</div><div class="proj-m">';
      inner += '<div class="proj-t">'+h(p.title||'Bok')+pbadge(p.status)+'</div>';
      inner += '<div class="proj-i">'+new Date(p.createdAt).toLocaleDateString('nb-NO')+' · '+(p.successCount||0)+'/'+p.total+' bilder';
      if(p.error) inner += '<br><span style="color:var(--err);font-size:10px">'+h(p.error)+'</span>';
      inner += '</div>';
      if(run) inner += '<div class="prow"><div class="prowf" style="width:'+pct+'%"></div></div>';
      inner += '</div></div>';
      inner += '<div class="pacts">';
      inner += '<button class="btn btn-g btn-sm" onclick="openProj(\''+p.id+'\')">Åpne</button>';
      inner += '<button class="btn btn-s btn-sm" onclick="dupProj(\''+p.id+'\')">Kopier</button>';
      if(p.status==='done') inner += '<button class="btn btn-s btn-sm" onclick="window.open(base()+\'/projects/'+p.id+'/export?type=text\',\'_blank\')">Eksporter</button>';
      if(run) inner += '<button class="btn btn-stop btn-sm" onclick="stopProj(\''+p.id+'\',this)">⏹ Stopp</button>';
      inner += '<button class="btn btn-d btn-sm" onclick="delProj(\''+p.id+'\',this)">Slett</button>';
      inner += '</div></div>';
    }
  }
  inner += '<button class="btn btn-s" style="margin-top:10px" onclick="document.getElementById(\'libMod\').remove()">Lukk</button>';
  inner += '</div>';
  ov.innerHTML = inner;
  document.body.appendChild(ov);
}

async function openProj(id) {
  document.getElementById('libMod')?.remove();
  try {
    var r = await fetch(base()+'/projects/'+id);
    var p = await r.json();
    if(p.error) { alert(p.error); return; }
    S.masterPrompt = p.masterPrompt||'';
    S.bookTitle = p.title||'';
    S.manus = p.manus||'';
    S.besk = p.beskrivelse||'';
    S.chars = (p.characters||[]).map(function(c){ return Object.assign({},c,{dataUrl:null}); });
    S.objs  = (p.objects||[]).map(function(o){ return Object.assign({},o,{dataUrl:null}); });
    if(p.world) {
      S.world = {
        wn: p.world.world_name||'',
        loc: p.world.core_location||'',
        lm: (p.world.recurring_landmarks||[]).join(', '),
        season: p.world.season||'',
        weather: p.world.weather_baseline||'',
        noenv: (p.world.forbidden_environment_drift||[]).join(', ')
      };
    }
    S.projId = id; S.proj = p;
    localStorage.setItem('proj_id', id);
    localStorage.setItem('sb_master', S.masterPrompt);
    if(p.status==='running'||p.status==='queued') startPoll(id);
    var hasRes = Object.values(p.results||{}).some(function(r){ return r.status==='done'; });
    S.step = hasRes ? 5 : 4;
    await doParse(); render();
  } catch(e) { alert('Feil: '+e.message); }
}

async function dupProj(id) {
  document.getElementById('libMod')?.remove();
  try {
    var r = await fetch(base()+'/projects/'+id+'/duplicate', {method:'POST'});
    var d = await r.json();
    if(d.error) { alert(d.error); return; }
    openProj(d.projectId);
  } catch(e) { alert(e.message); }
}

async function stopProj(id, btn) {
  try {
    await fetch(base()+'/projects/'+id+'/stop', {method:'POST'});
    if(btn) btn.textContent='Stopper…';
    setTimeout(showLibrary, 2000);
  } catch(e) { alert(e.message); }
}

async function delProj(id, btn) {
  if(!confirm('Slette prosjektet og alle bilder?')) return;
  try {
    var r = await fetch(base()+'/projects/'+id, {method:'DELETE'});
    var d = await r.json();
    if(d.error) { alert(d.error); return; }
    if(S.projId===id) { S.projId=null; S.proj=null; localStorage.removeItem('proj_id'); }
    var item = btn && btn.closest('.proj-item');
    if(item) item.remove();
  } catch(e) { alert(e.message); }
}

// ── Polling ────────────────────────────────────────────────────
function startPoll(id) {
  if(S.poll) clearInterval(S.poll);
  S.projId = id; localStorage.setItem('proj_id', id);
  S.poll = setInterval(async function(){
    try {
      var r = await fetch(base()+'/projects/'+id);
      S.proj = await r.json();
    } catch(_) {}
    if(S.step===4) renderMain();
    if(S.proj && ['done','stopped','error'].includes(S.proj.status)) {
      clearInterval(S.poll); S.poll = null;
    }
  }, 4000);
}

// ── Parse ──────────────────────────────────────────────────────
function triggerParse() {
  clearTimeout(S.debounce);
  S.debounce = setTimeout(doParse, 600);
}

async function doParse() {
  if(!S.manus.trim()) {
    S.pages=[]; S.warnings=[]; S.portraits=[];
    refreshParseUI(); return;
  }
  try {
    var body = {
      manus: S.manus,
      beskrivelse: S.besk,
      characters: S.chars.map(function(c){ return {id:c.id,name:c.name,rigidDesc:c.rigidDesc,fixedTraits:c.fixedTraits,forbiddenTraits:c.forbiddenTraits,conditionalTraits:c.conditionalTraits}; }),
      objects: S.objs.map(function(o){ return {id:o.id,name:o.name,rigidDesc:o.rigidDesc,defaultBinding:o.defaultBinding}; }),
      world: buildWorldObj()
    };
    var r = await fetch(base()+'/parse', {method:'POST', headers:{'Content-Type':'application/json'}, body:JSON.stringify(body)});
    var d = await r.json();
    S.pages = d.pages||[]; S.warnings = d.warnings||[]; S.portraits = d.portraitPages||[];
  } catch(_) { S.pages=[]; S.warnings=[]; S.portraits=[]; }
  refreshParseUI();
}

function buildWorldObj() {

// ── Start job ──────────────────────────────────────────────────
async function startJob() {
  if(!S.pages.length) { alert('Ingen sider funnet.'); return; }
  var cost = (S.pages.length * 0.065).toFixed(2);
  if(!confirm('Generere '+S.pages.length+' bilder?\nEstimert kostnad: $'+cost+'\n\nJobben kjører i bakgrunnen.')) return;

  var form = new FormData();
  form.append('openaiKey', S.apiKey);
  form.append('masterPrompt', S.masterPrompt);
  form.append('manus', S.manus);
  form.append('beskrivelse', S.besk);
  form.append('title', S.bookTitle || 'Bok '+new Date().toLocaleDateString('nb-NO'));
  form.append('characters', JSON.stringify(S.chars.map(function(c){ return {id:c.id,name:c.name,rigidDesc:c.rigidDesc,fixedTraits:c.fixedTraits,forbiddenTraits:c.forbiddenTraits,conditionalTraits:c.conditionalTraits}; })));
  form.append('objects', JSON.stringify(S.objs.map(function(o){ return {id:o.id,name:o.name,rigidDesc:o.rigidDesc,defaultBinding:o.defaultBinding}; })));
  var w = buildWorldObj();
  if(w) form.append('world', JSON.stringify(w));
  for(var i=0; i<S.chars.length; i++) {
    var c = S.chars[i];
    if(c.dataUrl) form.append('charImages', dataUrlToBlob(c.dataUrl), 'c'+c.id+'_'+c.name+'.png');
  }
  for(var j=0; j<S.objs.length; j++) {
    var o = S.objs[j];
    if(o.dataUrl) form.append('objImages', dataUrlToBlob(o.dataUrl), 'o'+o.id+'_'+o.name+'.png');
  }
  try {
    var r = await fetch(base()+'/projects', {method:'POST', body:form});
    var d = await r.json();
    if(d.error) { alert('Feil: '+d.error); return; }
    S.proj = null; startPoll(d.projectId); S.step=4; render();
  } catch(e) { alert('Feil: '+e.message); }
}

async function rerunPages() {
  if(!S.projId || !Object.keys(S.rerun).length) return;
  var nums = Object.keys(S.rerun).map(Number);
  if(!confirm('Kjør side '+nums.join(', ')+' på nytt?')) return;

}

function speak(text) {
  if(S.speaking) { speechSynthesis.cancel(); S.speaking=false; render(); return; }
  var u = new SpeechSynthesisUtterance(text);
  u.lang='nb-NO'; u.rate=0.88; u.pitch=1.05;
  u.onend = function(){ S.speaking=false; render(); };
  S.speaking = true; render();
  speechSynthesis.speak(u);
}

  var text = results.map(function(r){ return r.storyText; }).join('. ');

}

// ── Video — fixed and robust ───────────────────────────────────
async function makeVideo(withSpeech) {
  var results = getResults();
  if(!results.length) { alert('Ingen bilder å lage video av.'); return; }
  if(!window.MediaRecorder) { alert('Nettleseren din støtter ikke videoopptak. Bruk Chrome på Mac/PC.'); return; }

  S.vstatus = 'Laster bilder…'; renderMain();

  // Load all images first
  var imgs = await Promise.all(results.map(function(r) {
    return new Promise(function(res) {
      var img = new Image();
      img.crossOrigin = 'anonymous';
      img.onload = function(){ res(img); };
      img.onerror = function(){ res(null); };
      img.src = imgUrl(r.pageNum);
    });
  }));

  S.vstatus = 'Starter opptak…'; renderMain();

  var canvas = document.createElement('canvas');
  canvas.width = 1024; canvas.height = 1024;
  var ctx = canvas.getContext('2d');
  var stream = canvas.captureStream(25);

  var mimes = ['video/webm;codecs=vp9','video/webm;codecs=vp8','video/webm'];
  var mime = mimes.find(function(m){ return MediaRecorder.isTypeSupported(m); }) || 'video/webm';

  var rec = new MediaRecorder(stream, {mimeType:mime, videoBitsPerSecond:3000000});
  var chunks = [];
  rec.ondataavailable = function(e){ if(e.data && e.data.size>0) chunks.push(e.data); };
  rec.onstop = function() {
    var blob = new Blob(chunks, {type:mime});
    var url = URL.createObjectURL(blob);
    var a = document.createElement('a');
    a.href = url;
    a.download = (S.bookTitle||'eventyrbok')+'.webm';
    document.body.appendChild(a);
    a.click();
    setTimeout(function(){ document.body.removeChild(a); URL.revokeObjectURL(url); }, 1000);
    S.vstatus = 'Video klar! ✓'; renderMain();
    setTimeout(function(){ S.vstatus=''; renderMain(); }, 4000);
  };

  rec.start(200);

  for(var i=0; i<results.length; i++) {
    var r = results[i];
    var img = imgs[i];
    S.vstatus = 'Side '+r.pageNum+' av '+results.length+'…'; renderMain();

    // Draw frame
    ctx.clearRect(0,0,1024,1024);
    if(img) {
      ctx.drawImage(img, 0, 0, 1024, 1024);
    } else {
      ctx.fillStyle = '#1a1520';
      ctx.fillRect(0,0,1024,1024);
    }

    // Text overlay
    var g = ctx.createLinearGradient(0,700,0,1024);
    g.addColorStop(0,'rgba(0,0,0,0)');
    g.addColorStop(0.3,'rgba(0,0,0,0.65)');
    g.addColorStop(1,'rgba(0,0,0,0.9)');
    ctx.fillStyle = g;
    ctx.fillRect(0,700,1024,324);

    // Page badge
    ctx.fillStyle = 'rgba(184,145,42,0.92)';
    ctx.beginPath();
    ctx.roundRect(22,984,62,26,13);
    ctx.fill();
    ctx.fillStyle = '#fff';
    ctx.font = 'bold 13px Georgia,serif';
    ctx.textAlign = 'center';
    ctx.fillText(r.pageNum+'/'+results.length, 53, 1001);

    // Story text
    ctx.font = '22px Georgia,serif';
    ctx.shadowColor = 'rgba(0,0,0,0.85)';
    ctx.shadowBlur = 6;
    var words = (r.storyText||'').split(' ');
    var lines = []; var line = '';
    for(var w=0; w<words.length; w++) {
      var test = line + words[w] + ' ';
      if(ctx.measureText(test).width > 950 && line) {
        lines.push(line.trim()); line = words[w]+' ';
      } else { line = test; }
    }
    if(line.trim()) lines.push(line.trim());
    var shown = lines.slice(0,5);
    var sy = 752 + Math.max(0,(5-shown.length)*17);
    for(var l=0; l<shown.length; l++) {
      ctx.fillText(shown[l], 512, sy + l*34);
    }

    if(withSpeech && r.storyText) {
      await new Promise(function(res) {
        var u = new SpeechSynthesisUtterance(r.storyText);
        u.lang='nb-NO'; u.rate=0.85;
        u.onend = res; u.onerror = res;
        speechSynthesis.speak(u);
        setTimeout(res, 12000);
      });
      await new Promise(function(res){ setTimeout(res,400); });
    } else {
      await new Promise(function(res){ setTimeout(res,3000); });
    }
  }

  rec.stop();
}

// ── ZIP ───────────────────────────────────────────────────────
async function dlZip(withText) {
  if(!window.JSZip) {
    var s = document.createElement('script');
    s.src = 'https://cdnjs.cloudflare.com/ajax/libs/jszip/3.10.1/jszip.min.js';
    await new Promise(function(res){ s.onload=res; document.head.appendChild(s); });
  }
  var results = getResults();
  if(!results.length) { alert('Ingen bilder.'); return; }

  var zip = new window.JSZip();
  var folder = zip.folder(S.bookTitle||'eventyrbok');
  var txt = results.map(function(r){ return '[IMAGE: side_'+String(r.pageNum).padStart(3,'0')+']\n'+r.storyText; }).join('\n\n---\n\n');
  folder.file('historien.txt', txt);

  S.vstatus = 'Pakker bilder…'; renderMain();

  for(var i=0; i<results.length; i++) {
    var r = results[i];
    try {
      var resp = await fetch(imgUrl(r.pageNum));
      if(!resp.ok) continue;
      var fname = 'side_'+String(r.pageNum).padStart(2,'0')+'.png';
      if(withText) {
        var b64 = await burnText(resp, r, results.length);
        if(b64) folder.file(fname, b64, {base64:true});
      } else {
        folder.file(fname, await resp.arrayBuffer());
      }
    } catch(_) {}
  }

  var blob = await zip.generateAsync({type:'blob',compression:'DEFLATE',compressionOptions:{level:6}});
  var a = document.createElement('a');
  a.href = URL.createObjectURL(blob);
  a.download = (S.bookTitle||'eventyrbok')+'.zip';
  document.body.appendChild(a); a.click();
  setTimeout(function(){ document.body.removeChild(a); }, 1000);
  S.vstatus = ''; renderMain();
}

async function burnText(resp, r, total) {
  return new Promise(async function(res) {
    try {
      var burl = URL.createObjectURL(await resp.blob());
      var img = new Image();
      img.crossOrigin = 'anonymous';
      img.onload = function() {
        var c = document.createElement('canvas'); c.width=1024; c.height=1024;
        var ctx = c.getContext('2d'); ctx.drawImage(img,0,0,1024,1024);
        var g=ctx.createLinearGradient(0,700,0,1024);
        g.addColorStop(0,'rgba(0,0,0,0)');g.addColorStop(0.3,'rgba(0,0,0,0.65)');g.addColorStop(1,'rgba(0,0,0,0.9)');
        ctx.fillStyle=g; ctx.fillRect(0,700,1024,324);
        ctx.fillStyle='rgba(184,145,42,0.92)'; ctx.beginPath(); ctx.roundRect(22,984,62,26,13); ctx.fill();
        ctx.fillStyle='#fff'; ctx.font='bold 13px Georgia,serif'; ctx.textAlign='center'; ctx.fillText(r.pageNum+'/'+total,53,1001);
        ctx.font='22px Georgia,serif'; ctx.shadowColor='rgba(0,0,0,0.85)'; ctx.shadowBlur=6;
        var ws=(r.storyText||'').split(' '),ls=[],l='';
        for(var w of ws){var t=l+w+' ';if(ctx.measureText(t).width>950&&l){ls.push(l.trim());l=w+' ';}else l=t;}
        if(l.trim())ls.push(l.trim());
        var sh=ls.slice(0,5),sy=752+Math.max(0,(5-sh.length)*17);
        sh.forEach(function(ln,li){ ctx.fillText(ln,512,sy+li*34); });
        URL.revokeObjectURL(burl);
        res(c.toDataURL('image/png').split(',')[1]);
      };
      img.onerror = function(){ URL.revokeObjectURL(burl); res(null); };
      img.src = burl;
    } catch(_) { res(null); }
  });
}

// ── Helpers ────────────────────────────────────────────────────
function getResults() {
  return Object.values((S.proj&&S.proj.results)||{})
    .filter(function(r){ return r.status==='done'; })
    .sort(function(a,b){ return a.pageNum-b.pageNum; });
}
function imgUrl(pn) { return base()+'/image/'+S.projId+'/'+pn+'?t='+Date.now(); }
function dataUrlToBlob(du) {
  var parts = du.split(','), mime = parts[0].match(/:(.*?);/)[1];
  var bin = atob(parts[1]), arr = new Uint8Array(bin.length);
  for(var i=0; i<bin.length; i++) arr[i]=bin.charCodeAt(i);
  return new Blob([arr],{type:mime});
}
function addImages(files, arr, prefix) {
  Array.from(files).forEach(function(f, i) {
    var rd = new FileReader();
    rd.onload = function() {
      var id = String(arr.length+i+1).padStart(2,'0');
      arr.push({id:id,name:prefix+id,rigidDesc:'',fixedTraits:[],forbiddenTraits:[],conditionalTraits:[],defaultBinding:'none',dataUrl:rd.result});
      render();
    };
    rd.readAsDataURL(f);
  });
}

  out += '<div class="card"><div class="card-title">🎬 Bildebeskrivelser</div>';
  out += '<div style="background:#f8f4ec;border:1px solid var(--light);border-radius:8px;padding:10px;margin-bottom:10px;font-size:11px;color:var(--muted);line-height:1.9">';
  out += '<span class="tag">#sc</span>scene <span class="tag tag-b">#cam close/medium/wide</span> <span class="tag tag-b">#angle eye/low/high/above</span> <span class="tag tag-b">#scale ground/above-head/rooftop/over-neighborhood</span><br>';
  out += '<span class="tag">#focus primary:#c01 secondary:#c02</span> <span class="tag tag-g">#bg 10-15 seated tribune blurred</span> <span class="tag">#/</span>beskrivelse<br>';
  out += 'Rel: <span class="tag tag-v">#o01@#c02</span> <span class="tag tag-v">#c01>#o01</span> <span class="tag tag-v">#c01+#c02</span><br>';
  if(cc) out += cc + '<br>';
  if(oc) out += oc;
  out += '</div>';
  out += '<textarea id="beskTA" rows="9" class="mono" placeholder="#p001 #c01 #sc solrik eng, dag #cam wide #scale ground #/ Snufselufs sitter på en sky">'+h(S.besk)+'</textarea></div>';

  var hasW = S.warnings.length || S.portraits.length;
  out += '<div id="parseWarn">'+(hasW ? '<div class="card" style="border-color:rgba(184,145,42,.4)"><div class="card-title" style="color:#b07800">⚠️ Advarsler</div>'+buildWarnings()+'</div>' : '')+'</div>';

  if(S.pages.length) {
    out += '<div class="card"><div class="card-title">Forhåndsvisning — '+S.pages.length+' sider</div>';
    out += '<div style="overflow-x:auto"><table class="pt"><thead><tr><th>Side</th><th>Chars</th><th>Scene</th><th>Kamera</th><th>Rel.</th><th>Visuelt</th></tr></thead>';
    out += '<tbody id="previewBody">'+buildPreviewRows()+'</tbody></table></div></div>';
  }

  out += '<div class="btn-row"><button class="btn btn-s" onclick="S.step=2;render()">← Tilbake</button>';
  out += '<button class="btn btn-g"'+(S.pages.length?'':' disabled')+'  onclick="S.step=4;render()">Neste →</button></div>';
  return out;
}

// ── Page: Generate ─────────────────────────────────────────────
function pgGen() {
  var proj = S.proj;
  if(!proj) {
    var out = '<div class="card"><div class="card-title">Sjekkliste</div>';
    out += ck('OpenAI nøkkel', !!S.apiKey, S.apiKey?'Klar':'Mangler', false);
    out += ck('Masterprompt', !!S.masterPrompt, S.masterPrompt?'Klar':'Standard brukes', false);
    out += ck('Karakterer', S.chars.length>0, S.chars.length+' karakterer', S.chars.length===0);
    out += ck('Manus', S.pages.length>0, S.pages.length+' sider', S.pages.length===0);
    out += ck('World DNA', !!S.world.loc, S.world.loc?'Definert':'Ikke satt', true);
    out += '</div>';
    out += '<div class="notice ni">💡 Jobben kjører i bakgrunnen. Du kan lukke appen og komme tilbake.</div>';
    var disabled = (!S.apiKey||!S.pages.length) ? ' disabled' : '';
    out += '<button class="btn btn-p"'+disabled+' onclick="startJob()">🎨 Start — '+S.pages.length+' bilder (~$'+(S.pages.length*0.065).toFixed(2)+')</button>';
    out += '<button class="btn btn-s" style="margin-top:8px" onclick="S.step=3;render()">← Tilbake</button>';
    return out;
  }

  var results = Object.values(proj.results||{}).sort(function(a,b){return a.pageNum-b.pageNum;});
  var done = results.filter(function(r){return r.status==='done';}).length;
  var total = proj.total || S.pages.length || 0;
  var pct = total>0 ? Math.round((proj.progress||0)/total*100) : 0;
  var running = proj.status==='running'||proj.status==='queued';

  var labels = {done:'✅ Ferdig',running:'🎨 Genererer…',queued:'⏳ Venter…',stopped:'⏹ Stoppet',error:'⚠️ Feil'};
  var out = '<div class="card">';
  out += '<div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:11px">';
  out += '<div class="card-title" style="margin-bottom:0">'+(labels[proj.status]||proj.status)+'</div>';
  if(running) out += '<button class="btn btn-stop btn-sm" onclick="stopJob()">⏹ Stopp</button>';
  out += '</div>';

  if(running) {
    out += '<div style="font-size:13px;color:var(--warm);margin-bottom:7px;font-style:italic">'+done+' av '+total+' bilder</div>';
    out += '<div class="pbar-w"><div class="pbar" style="width:'+pct+'%"></div></div>';
    out += '<p class="hint" style="text-align:right;margin-top:5px">Oppdateres automatisk · '+ago(proj.createdAt)+'</p>';
  } else {
    out += '<p style="font-size:13px;color:var(--muted);margin-bottom:10px">'+done+' av '+total+' generert · '+ago(proj.updatedAt||proj.createdAt)+'</p>';
  }
  if(proj.error) out += '<div class="notice ne" style="margin-top:8px">'+h(proj.error)+'</div>';

  // Grid
  out += '<div class="grid">';
  for(var i=0; i<total; i++) {
    var pn = i+1;
    var r = results.find(function(x){return x.pageNum===pn;});
    var spin = (running && i < (proj.progress||0)) ? ' spin' : '';
    if(!r) {
      out += '<div class="cell'+spin+'">'+pn+'</div>';
    } else if(r.status==='error') {
      var sel = S.rerun[pn] ? ' style="border-color:var(--gold);border-width:2.5px"' : '';
      out += '<div class="cell err" onclick="S.rerun['+pn+']=!S.rerun['+pn+'];render()"'+sel+'>✗<div class="cell-n">'+pn+'</div></div>';
    } else if(r.status==='done') {
      out += '<div class="cell done" onclick="S.cur='+i+';S.step=5;render()"><img src="'+imgUrl(pn)+'" loading="lazy"><div class="cell-n">'+pn+'</div></div>';
    } else {
      out += '<div class="cell'+spin+'">'+pn+'</div>';
    }
  }
  out += '</div></div>';

  if(Object.keys(S.rerun).filter(function(k){return S.rerun[k];}).length) {
    out += '<div class="notice nw">'+Object.keys(S.rerun).filter(function(k){return S.rerun[k];}).length+' side(r) valgt<br><button class="btn btn-g btn-sm" style="margin-top:7px" onclick="rerunPages()">↻ Kjør på nytt</button></div>';
  }
  if(proj.status==='stopped'||proj.status==='error') {
    out += '<div class="notice nw">Jobben er '+(proj.status==='stopped'?'stoppet':'feilet')+'.<br><button class="btn btn-g btn-sm" style="margin-top:7px" onclick="rerunPages()">↻ Gjenstart</button></div>';
  }
  if(done>0) out += '<button class="btn btn-p" onclick="S.step=5;render()">Se bilder →</button>';
  out += '<button class="btn btn-s" style="margin-top:8px" onclick="S.projId=null;S.proj=null;localStorage.removeItem(\'proj_id\');if(S.poll)clearInterval(S.poll);render()">+ Nytt prosjekt</button>';
  return out;
}

function ck(l, ok, d, w) {
  var cls = ok ? 'ok-t' : w ? 'wt' : 'et';
  var icon = ok ? '✓' : w ? '⚠' : '✗';
  return '<div class="crow"><span>'+l+'</span><span class="'+cls+'">'+icon+' '+d+'</span></div>';
}

// ── Page: Viewer ───────────────────────────────────────────────
function pgViewer() {
  var results = getResults();
  if(!results.length) {
    return '<div class="notice nw">Ingen bilder ennå.</div><button class="btn btn-p" onclick="S.step=4;render()">← Tilbake</button>';
  }
  if(S.cur >= results.length) S.cur = 0;
  var cur = results[S.cur];
  var total = S.proj && S.proj.total ? S.proj.total : results.length;

  var out = '<div class="vwrap">';
  out += '<img src="'+imgUrl(cur.pageNum)+'" loading="lazy" alt="Side '+cur.pageNum+'">';
  out += '<div class="vbadge">'+cur.pageNum+' / '+total+'</div>';
  out += '<button class="vspeak" onclick="speak(\''+h(cur.storyText||'').replace(/'/g,"\\'")+'\')">'+(S.speaking?'⏹':'🔊')+'</button>';
  out += '</div>';
  out += '<div class="vtxt">'+h(cur.storyText)+'</div>';

  out += '<div class="vnav">';
  out += '<button class="nav-btn"'+(S.cur<=0?' disabled':'')+'  onclick="S.cur--;render()">‹</button>';
  out += '<div class="nc">'+(S.cur+1)+' av '+results.length+'</div>';
  out += '<button class="nav-btn"'+(S.cur>=results.length-1?' disabled':'')+'  onclick="S.cur++;render()">›</button>';
  out += '</div>';

  out += '<div class="strip" id="strip">';
  for(var i=0; i<results.length; i++) {
    var r = results[i];
    out += '<div class="sc'+(i===S.cur?' active':'')+'  onclick="S.cur='+i+';render()">';
    out += '<img src="'+imgUrl(r.pageNum)+'" loading="lazy">';
    out += '<div class="sc-n">'+r.pageNum+'</div></div>';
  }
  out += '</div>';

  out += '<div class="stip">📱 <strong>Lagre:</strong> Trykk og hold → «Legg til i Bilder»</div>';

  out += '<div class="card"><div class="card-title">📦 Eksport</div><div class="dl-grid">';
  out += '<div class="dlb" onclick="dlZip(false)"><span class="dli">📦</span><span class="dll">ZIP uten tekst</span></div>';
  out += '<div class="dlb" onclick="dlZip(true)"><span class="dli">📦✍️</span><span class="dll">ZIP med tekst</span></div>';
  out += '<div class="dlb" onclick="makeVideo(false)"><span class="dli">🎬</span><span class="dll">Video slideshow</span></div>';
  out += '<div class="dlb" onclick="makeVideo(true)"><span class="dli">🎬🔊</span><span class="dll">Video med stemme</span></div>';
  out += '<div class="dlb" onclick="window.open(base()+\'/projects/\'+S.projId+\'/export?type=text\',\'_blank\')"><span class="dli">📄</span><span class="dll">Tekstfil</span></div>';
  out += '<div class="dlb" onclick="speakAll()"><span class="dli">'+(S.speaking?'⏹':'🎙')+'</span><span class="dll">'+(S.speaking?'Stopp':'Les opp')+'</span></div>';
  out += '</div>';
  if(S.vstatus) out += '<div class="vstatus">⏳ '+h(S.vstatus)+'</div>';
  out += '</div>';

  out += '<div class="btn-row">';
  out += '<button class="btn btn-s" onclick="S.step=4;render()">← Oversikt</button>';
  out += '<button class="btn btn-g" onclick="dupProj(S.projId)">📋 Dupliser</button>';
  out += '</div>';
  return out;
}

// ── Event wiring ───────────────────────────────────────────────
function hookEvents() {
  // Setup page inputs
  var ak = document.getElementById('apiKeyIn');
  if(ak) ak.oninput = function(){ S.apiKey=this.value; localStorage.setItem('oai_key',this.value); };
  var mi = document.getElementById('masterIn');
  if(mi) mi.oninput = function(){ S.masterPrompt=this.value; localStorage.setItem('sb_master',this.value); };
  var ti = document.getElementById('titleIn');
  if(ti) ti.oninput = function(){ S.bookTitle=this.value; };

  // World inputs
  var wids = ['wn','loc','lm','season','weather','noenv'];
  for(var i=0; i<wids.length; i++) {
    (function(key) {
      var el = document.getElementById('w-'+key);
      if(el) el.oninput = function(){ S.world[key]=this.value; };
    })(wids[i]);
  }

  // Manus / besk textareas
  var mt = document.getElementById('manusTA');
  if(mt) mt.oninput = function(){ S.manus=this.value; triggerParse(); };
  var bt = document.getElementById('beskTA');
  if(bt) bt.oninput = function(){ S.besk=this.value; triggerParse(); };

  // Character inputs (data-ci + data-f)
  document.querySelectorAll('[data-ci]').forEach(function(el) {
    el.oninput = function() {
      var ci = parseInt(this.dataset.ci);
      var f = this.dataset.f;
      if(f==='fixedTraits'||f==='forbiddenTraits') {
        S.chars[ci][f] = this.value.split(',').map(function(s){return s.trim();}).filter(Boolean);
      } else {
        S.chars[ci][f] = this.value;
      }
    };
  });
  // Object inputs
  document.querySelectorAll('[data-oi]').forEach(function(el) {
    el.oninput = function() {
      var oi = parseInt(this.dataset.oi);
      var f = this.dataset.f;
      S.objs[oi][f] = this.value;
    };
  });

  // File inputs
  var cf = document.getElementById('charFile');
  if(cf) cf.onchange = function(){ addImages(this.files, S.chars, 'c'); };
  var of2 = document.getElementById('objFile');
  if(of2) of2.onchange = function(){ addImages(this.files, S.objs, 'o'); };

  // Strip scroll
  var strip = document.getElementById('strip');
  if(strip) {
    var ac = strip.querySelector('.sc.active');
    if(ac) ac.scrollIntoView({behavior:'smooth',block:'nearest',inline:'center'});
  }
}

// ── Boot ───────────────────────────────────────────────────────
render();
checkHealth();

if(S.projId) {
  fetch(base()+'/projects/'+S.projId)
    .then(function(r){ return r.json(); })
    .then(function(d) {
      S.proj = d;
      if(d.status==='running'||d.status==='queued') startPoll(S.projId);
      render();
    })
    .catch(function(){});
}
</script>
