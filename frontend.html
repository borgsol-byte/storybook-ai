<!DOCTYPE html>

<html lang="no">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<title>StoryBook AI</title>
<link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@700;900&family=Lora:ital,wght@0,400;0,500;1,400&display=swap" rel="stylesheet">
<style>
:root{
  --ink:#1a1520;--paper:#faf6ef;--gold:#b8912a;--gold2:#d4a843;
  --warm:#8b6914;--muted:#7a6e5a;--light:#ede5d4;--err:#c0392b;
  --ok:#2d7a4f;--r:13px;--sh:0 3px 20px rgba(0,0,0,0.09);
}
*{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent}
body{background:var(--paper);color:var(--ink);font-family:'Lora',Georgia,serif;min-height:100vh}

.hdr{background:var(–ink);text-align:center;padding:28px 20px 18px;position:relative;overflow:hidden}
.hdr::before{content:’’;position:absolute;inset:0;background:radial-gradient(ellipse at 50% 130%,rgba(184,145,42,0.18) 0%,transparent 65%)}
.hdr-eye{font-size:10px;letter-spacing:5px;color:var(–gold);text-transform:uppercase;margin-bottom:7px;position:relative}
.hdr-title{font-family:‘Playfair Display’,serif;font-size:clamp(32px,9vw,52px);font-weight:900;line-height:1;position:relative;
background:linear-gradient(135deg,#f0d878,var(–gold2),#c9922a,#f0d878);background-size:300% 100%;
-webkit-background-clip:text;-webkit-text-fill-color:transparent;animation:shimmer 5s linear infinite}
.hdr-sub{font-size:13px;color:#5a5060;margin-top:7px;font-style:italic;position:relative}
.status-pill{display:inline-flex;align-items:center;gap:6px;margin-top:11px;padding:5px 14px;border-radius:20px;font-size:12px;position:relative;border:1px solid;transition:all 0.3s}
.status-pill.ok {background:rgba(45,122,79,0.15);border-color:rgba(45,122,79,0.4);color:#2d7a4f}
.status-pill.err{background:rgba(192,57,43,0.12);border-color:rgba(192,57,43,0.35);color:#c0392b}
.status-pill.chk{background:rgba(255,255,255,0.05);border-color:rgba(255,255,255,0.1);color:#4a4060}
.pdot{width:7px;height:7px;border-radius:50%;background:currentColor;animation:pulse 2s infinite}
@keyframes shimmer{0%{background-position:0%}100%{background-position:300%}}
@keyframes pulse{0%,100%{opacity:1}50%{opacity:0.35}}

.tabs{display:flex;background:var(–ink);border-bottom:1px solid rgba(184,145,42,0.18);overflow-x:auto;scrollbar-width:none}
.tabs::-webkit-scrollbar{display:none}
.tab{flex:1;min-width:68px;padding:12px 5px 10px;background:none;border:none;border-bottom:2.5px solid transparent;
color:#3a3030;font-size:10.5px;font-family:‘Lora’,serif;cursor:pointer;text-align:center;transition:all 0.2s;white-space:nowrap}
.tab.active{color:var(–gold2);border-bottom-color:var(–gold2)}
.tab.done{color:#5a4a30}
.tab-icon{display:block;font-size:18px;margin-bottom:3px}

.main{max-width:600px;margin:0 auto;padding:20px 14px 90px}
.card{background:#fff;border:1px solid var(–light);border-radius:var(–r);padding:18px;margin-bottom:14px;box-shadow:var(–sh)}
.card-title{font-family:‘Playfair Display’,serif;font-size:11.5px;font-weight:700;letter-spacing:1.2px;color:var(–gold);text-transform:uppercase;margin-bottom:14px}

.lbl{display:block;font-size:13px;color:var(–warm);margin-bottom:5px;font-weight:500}
.hint{font-size:12px;color:var(–muted);font-style:italic;margin-top:5px;line-height:1.55}
input[type=text],input[type=password],textarea{width:100%;padding:11px 13px;background:var(–paper);border:1.5px solid var(–light);
border-radius:9px;color:var(–ink);font-family:‘Lora’,serif;font-size:14px;outline:none;transition:border 0.2s;-webkit-appearance:none}
input:focus,textarea:focus{border-color:var(–gold2)}
textarea{resize:vertical;line-height:1.7}
.mono{font-family:monospace;font-size:13px;line-height:1.6}

.btn{display:inline-flex;align-items:center;justify-content:center;gap:7px;padding:13px 20px;border-radius:28px;border:none;
font-family:‘Playfair Display’,serif;font-size:14px;font-weight:700;cursor:pointer;transition:all 0.18s;width:100%;-webkit-appearance:none}
.btn:active{transform:scale(0.97)}
.btn-primary{background:linear-gradient(135deg,var(–gold),var(–gold2));color:#fff;font-size:15px;padding:15px;box-shadow:0 4px 16px rgba(184,145,42,0.28)}
.btn-primary:disabled{opacity:0.38;cursor:not-allowed;transform:none}
.btn-secondary{background:transparent;border:1.5px solid var(–light);color:var(–muted)}
.btn-ghost{background:transparent;border:1.5px solid var(–gold);color:var(–gold)}
.btn-danger{background:rgba(192,57,43,0.1);border:1.5px solid rgba(192,57,43,0.4);color:var(–err)}
.btn-small{padding:8px 16px;font-size:12px;border-radius:20px;width:auto}
.btn-row{display:flex;gap:9px}
.btn-row .btn{flex:1}

.upload-zone{border:2px dashed var(–light);border-radius:9px;padding:16px;text-align:center;cursor:pointer;background:var(–paper);transition:border 0.2s}
.upload-zone:active{border-color:var(–gold2)}
.thumbs{display:flex;flex-wrap:wrap;gap:7px;margin-top:10px}
.thumb{position:relative;width:66px;height:66px;border-radius:8px;overflow:hidden;border:2px solid var(–light)}
.thumb img{width:100%;height:100%;object-fit:cover;display:block}
.thumb-label{position:absolute;bottom:0;left:0;right:0;background:rgba(0,0,0,0.62);color:#fff;font-size:9px;text-align:center;padding:2px 3px;line-height:1.3}
.thumb-del{position:absolute;top:-5px;right:-5px;width:18px;height:18px;background:var(–err);border:2px solid #fff;border-radius:50%;color:#fff;font-size:10px;font-weight:700;display:flex;align-items:center;justify-content:center;cursor:pointer}

.char-item{display:flex;gap:10px;align-items:flex-start;padding:12px;background:var(–paper);border:1px solid var(–light);border-radius:9px;margin-bottom:8px}
.char-thumb{width:52px;height:52px;border-radius:7px;object-fit:cover;border:2px solid var(–light);flex-shrink:0}
.char-thumb-empty{width:52px;height:52px;border-radius:7px;background:var(–light);display:flex;align-items:center;justify-content:center;font-size:22px;flex-shrink:0}
.char-info{flex:1;min-width:0}
.char-id{font-size:10px;color:var(–gold);font-family:‘Playfair Display’,serif;font-weight:700;letter-spacing:1px;margin-bottom:3px}

/* Preview table */
.preview-table{width:100%;border-collapse:collapse;font-size:12px}
.preview-table th{text-align:left;padding:6px 8px;color:var(–gold);font-family:‘Playfair Display’,serif;font-weight:700;font-size:10px;letter-spacing:1px;text-transform:uppercase;border-bottom:1px solid var(–light)}
.preview-table td{padding:7px 8px;border-bottom:1px solid var(–light);vertical-align:top;color:var(–muted);line-height:1.4}
.preview-table td:first-child{color:var(–gold);font-family:‘Playfair Display’,serif;font-weight:700;white-space:nowrap}
.preview-table tr:last-child td{border-bottom:none}
.tag{display:inline-block;background:rgba(184,145,42,0.12);color:var(–warm);border-radius:4px;padding:1px 5px;font-size:10px;margin-right:3px;font-family:monospace}
.tag-sc{background:rgba(45,122,79,0.1);color:var(–ok)}

.progress-label{font-size:14px;color:var(–warm);margin-bottom:9px;font-style:italic;min-height:20px}
.progress-bar{height:8px;background:var(–light);border-radius:4px;overflow:hidden}
.progress-fill{height:100%;border-radius:4px;background:linear-gradient(90deg,var(–gold),var(–gold2));transition:width 0.5s ease}

.live-grid{display:grid;grid-template-columns:repeat(4,1fr);gap:6px;margin-top:14px}
.live-cell{aspect-ratio:1;border-radius:8px;overflow:hidden;background:var(–light);border:1.5px solid var(–light);
display:flex;align-items:center;justify-content:center;font-family:‘Playfair Display’,serif;font-size:11px;color:#bbb;transition:border 0.2s;position:relative;cursor:pointer}
.live-cell.done{border-color:var(–gold2)}
.live-cell.err{border-color:var(–err);color:var(–err)}
.live-cell.spin{border-color:var(–gold);animation:borderPulse 1.5s infinite}
.live-cell img{width:100%;height:100%;object-fit:cover;display:block}
.live-cell-num{position:absolute;bottom:3px;right:5px;font-size:9px;color:rgba(255,255,255,0.85);font-family:‘Playfair Display’,serif;font-weight:700;text-shadow:0 1px 3px rgba(0,0,0,0.8)}
@keyframes borderPulse{0%,100%{border-color:var(–gold)}50%{border-color:var(–gold2)}}

.viewer-wrap{background:var(–ink);border-radius:var(–r);overflow:hidden;margin-bottom:13px;box-shadow:var(–sh);position:relative}
.viewer-wrap img{width:100%;display:block;background:var(–ink);min-height:200px}
.viewer-badge{position:absolute;top:11px;left:11px;background:rgba(0,0,0,0.65);border-radius:18px;padding:4px 12px;font-size:12px;color:var(–gold2);font-family:‘Playfair Display’,serif;font-weight:700}
.viewer-speak{position:absolute;top:11px;right:11px;width:38px;height:38px;border-radius:50%;background:rgba(0,0,0,0.55);border:1px solid rgba(255,255,255,0.2);color:#fff;font-size:16px;cursor:pointer;display:flex;align-items:center;justify-content:center}
.viewer-text{padding:13px 17px 15px;font-size:15px;line-height:1.75;color:#c8b99a;font-style:italic;background:var(–ink);border-radius:0 0 var(–r) var(–r)}
.viewer-nav{display:flex;gap:10px;align-items:center;justify-content:center;margin:12px 0}
.nav-btn{width:48px;height:48px;border-radius:50%;border:1.5px solid var(–light);background:#fff;font-size:21px;cursor:pointer;display:flex;align-items:center;justify-content:center;box-shadow:var(–sh);transition:all 0.15s}
.nav-btn:disabled{opacity:0.25}
.nav-btn:active{transform:scale(0.92)}
.nav-counter{font-family:‘Playfair Display’,serif;font-size:14px;color:var(–muted);flex:1;text-align:center}
.strip{display:flex;gap:6px;overflow-x:auto;padding:3px 2px 10px;margin-bottom:14px;-webkit-overflow-scrolling:touch;scrollbar-width:none}
.strip::-webkit-scrollbar{display:none}
.strip-cell{flex-shrink:0;width:60px;cursor:pointer;border-radius:7px;overflow:hidden;border:2.5px solid transparent;transition:border 0.15s;background:var(–light)}
.strip-cell.active{border-color:var(–gold2)}
.strip-cell img{width:60px;height:60px;object-fit:cover;display:block}
.strip-num{text-align:center;font-size:10px;color:var(–muted);padding:2px 0 3px;font-family:‘Playfair Display’,serif}

.notice{padding:11px 15px;border-radius:9px;font-size:13px;line-height:1.6;margin-bottom:13px}
.notice-warn{background:#fff8e6;border:1px solid #e8c84a;color:#7a5a00}
.notice-info{background:#f0f5ff;border:1px solid #b0c4f0;color:#2a3d6a}
.notice-ok  {background:#f0faf4;border:1px solid #7dd4a0;color:#1a4f30}
.notice-err {background:#fff0ee;border:1px solid #f0a090;color:#7a1a10}

.dl-grid{display:grid;grid-template-columns:1fr 1fr;gap:9px}
.dl-btn{padding:14px 9px;border-radius:11px;border:1.5px solid var(–light);background:var(–paper);text-align:center;cursor:pointer;transition:background 0.15s}
.dl-btn:active{background:var(–light)}
.dl-icon{font-size:21px;display:block;margin-bottom:3px}
.dl-label{font-size:11.5px;color:var(–muted);line-height:1.4}

.check-row{display:flex;justify-content:space-between;align-items:center;padding:8px 0;border-bottom:1px solid var(–light);font-size:13.5px}
.check-row:last-child{border-bottom:none}
.ok-t{color:var(–ok);font-size:12.5px}
.warn-t{color:#b07800;font-size:12.5px}
.err-t{color:var(–err);font-size:12.5px}

.save-tip{background:var(–ink);color:#c8b99a;border-radius:var(–r);padding:15px 17px;margin-bottom:14px;font-size:13px;line-height:1.7}
.save-tip strong{color:var(–gold2)}

.video-status{font-size:13px;color:var(–warm);font-style:italic;margin-top:10px;min-height:18px}
</style>

</head>
<body>

<header class="hdr">
  <div class="hdr-eye">✦ AI Eventyrbok ✦</div>
  <h1 class="hdr-title">StoryBook AI</h1>
  <p class="hdr-sub">Automatisk bildebok — lukk appen og kom tilbake</p>
  <div class="status-pill chk" id="pill">
    <div class="pdot"></div>
    <span id="pillTxt">Sjekker…</span>
  </div>
</header>

<nav class="tabs" id="tabs"></nav>
<main class="main" id="main"></main>

<script>
// ═══════════════════════════════════════
//  STATE
// ═══════════════════════════════════════
const S = {
  step: 0,
  apiKey:   localStorage.getItem('oai_key')  || '',
  antKey:   localStorage.getItem('ant_key')  || '',
  masterPrompt: '',
  characters: [],
  objects:    [],
  manus:        '',
  beskrivelse:  '',
  parsedPages:  [],
  jobId:   localStorage.getItem('job_id') || null,
  jobData: null,
  polling: null,
  curPage:  0,
  speaking: false,
  rerunSet: new Set(),
  videoStatus: '',
};

const STEPS = [
  {icon:'⚙️', label:'Oppsett'},
  {icon:'👤', label:'Karakterer'},
  {icon:'📖', label:'Manus'},
  {icon:'🎨', label:'Generer'},
  {icon:'📚', label:'Visning'},
];

function base() { return window.location.origin; }

// ═══════════════════════════════════════
//  BACKEND CHECK
// ═══════════════════════════════════════
async function updatePill() {
  const pill=document.getElementById('pill'), txt=document.getElementById('pillTxt');
  try {
    const r = await fetch(base()+'/health',{signal:AbortSignal.timeout(5000)});
    const d = await r.json();
    if (d.ok) { pill.className='status-pill ok'; txt.textContent='Backend tilkoblet ✓'; return true; }
  } catch(_) {}
  pill.className='status-pill err'; txt.textContent='Finner ikke backend';
  return false;
}

// ═══════════════════════════════════════
//  POLLING
// ═══════════════════════════════════════
function startPolling(jobId) {
  if (S.polling) clearInterval(S.polling);
  S.jobId = jobId;
  localStorage.setItem('job_id', jobId);
  S.polling = setInterval(async () => {
    await fetchJob(jobId);
    if (S.step===3) renderMain();
    if (S.jobData?.status==='done'||S.jobData?.status==='error') {
      clearInterval(S.polling); S.polling=null;
    }
  }, 4000);
}

async function fetchJob(jobId) {
  if (!jobId) return;
  try { const r=await fetch(base()+`/jobs/${jobId}`); S.jobData=await r.json(); } catch(_) {}
}

// ═══════════════════════════════════════
//  PARSE
// ═══════════════════════════════════════
async function parsePages() {
  if (!S.manus.trim()) return;
  try {
    const r = await fetch(base()+'/parse', {
      method:'POST', headers:{'Content-Type':'application/json'},
      body: JSON.stringify({ manus:S.manus, beskrivelse:S.beskrivelse, characters:S.characters, objects:S.objects }),
    });
    const d = await r.json();
    S.parsedPages = d.pages || [];
  } catch(_) {
    // Client fallback
    S.parsedPages = clientParse();
  }
  renderMain();
}

function clientParse() {
  const pages = [];
  const sections = S.manus.split(/(?=#p\d+)/i).filter(s=>s.trim());
  for (const sec of sections) {
    const lines = sec.trim().split('\n').map(l=>l.trim()).filter(Boolean);
    if (!lines.length) continue;
    const pm = lines[0].match(/#p(\d+)/i);
    if (!pm) continue;
    pages.push({ pageNum:parseInt(pm[1]), storyText:lines.slice(1).join(' ').trim(), charRefs:[], objRefs:[], scene:'', visualDesc:'' });
  }
  return pages.sort((a,b)=>a.pageNum-b.pageNum);
}

// ═══════════════════════════════════════
//  START JOB
// ═══════════════════════════════════════
async function startJob() {
  const cost = (S.parsedPages.length * 0.065).toFixed(2);
  if (!confirm(`Generere ${S.parsedPages.length} bilder?\nEstimert kostnad: $${cost}\n\nJobben kjører i bakgrunnen — du kan lukke appen.`)) return;

  const form = new FormData();
  form.append('openaiKey',    S.apiKey);
  form.append('masterPrompt', S.masterPrompt);
  form.append('manus',        S.manus);
  form.append('beskrivelse',  S.beskrivelse);
  form.append('pagesJson',    JSON.stringify(S.parsedPages));
  form.append('characters',   JSON.stringify(S.characters.map(c=>({id:c.id,name:c.name,description:c.description}))));
  form.append('objects',      JSON.stringify(S.objects.map(o=>({id:o.id,name:o.name,description:o.description}))));

  for (const c of S.characters) {
    if (c.dataUrl) form.append('charImages', dataUrlToBlob(c.dataUrl), `c${c.id}_${c.name}.png`);
  }
  for (const o of S.objects) {
    if (o.dataUrl) form.append('objImages', dataUrlToBlob(o.dataUrl), `o${o.id}_${o.name}.png`);
  }

  try {
    const r = await fetch(base()+'/jobs',{method:'POST',body:form});
    const d = await r.json();
    if (d.error) { alert('Feil: '+d.error); return; }
    startPolling(d.jobId);
    S.step=3; render();
  } catch(err) { alert('Feil: '+err.message); }
}

async function rerunPages() {
  if (!S.jobId||!S.rerunSet.size) return;
  const nums = [...S.rerunSet];
  if (!confirm(`Kjør side ${nums.join(', ')} på nytt?`)) return;
  try {
    await fetch(base()+`/jobs/${S.jobId}/rerun`,{
      method:'POST', headers:{'Content-Type':'application/json'},
      body: JSON.stringify({pageNums:nums}),
    });
    S.rerunSet.clear();
    startPolling(S.jobId); render();
  } catch(err) { alert('Feil: '+err.message); }
}

// ═══════════════════════════════════════
//  IMAGE URL
// ═══════════════════════════════════════
function imgUrl(jobId, pageNum) {
  return base()+`/image/${jobId}/${pageNum}?t=${Date.now()}`;
}

// ═══════════════════════════════════════
//  VOICE
// ═══════════════════════════════════════
function speak(text) {
  if (S.speaking) { speechSynthesis.cancel(); S.speaking=false; render(); return; }
  const u = new SpeechSynthesisUtterance(text);
  u.lang='nb-NO'; u.rate=0.88; u.pitch=1.05;
  u.onend=()=>{S.speaking=false;render();};
  S.speaking=true; render();
  speechSynthesis.speak(u);
}

// ═══════════════════════════════════════
//  VIDEO EXPORT
// ═══════════════════════════════════════
async function makeVideo(withSpeech) {
  const results = Object.values(S.jobData?.results||{}).filter(r=>r.status==='done').sort((a,b)=>a.pageNum-b.pageNum);
  if (!results.length) return;

  S.videoStatus = 'Laster bilder…'; renderMain();

  // Pre-load all images
  const loadedImages = await Promise.all(results.map(r => new Promise((res,rej) => {
    const img = new Image();
    img.crossOrigin = 'anonymous';
    img.onload = () => res(img);
    img.onerror = () => res(null);
    img.src = imgUrl(S.jobId, r.pageNum);
  })));

  S.videoStatus = 'Lager video…'; renderMain();

  const canvas = document.createElement('canvas');
  canvas.width = 1024; canvas.height = 1024;
  const ctx = canvas.getContext('2d');
  const stream = canvas.captureStream(1);
  const mime = MediaRecorder.isTypeSupported('video/webm;codecs=vp9') ? 'video/webm;codecs=vp9' : 'video/webm';
  const rec = new MediaRecorder(stream, {mimeType: mime});
  const chunks = [];
  rec.ondataavailable = e => e.data.size && chunks.push(e.data);
  rec.onstop = () => {
    const blob = new Blob(chunks, {type:'video/webm'});
    const a = document.createElement('a');
    a.href = URL.createObjectURL(blob);
    a.download = 'eventyrbok.webm';
    a.click();
    S.videoStatus = 'Video klar! ✓'; renderMain();
    setTimeout(()=>{S.videoStatus='';renderMain();}, 3000);
  };

  rec.start();

  for (let i=0; i<results.length; i++) {
    const r = results[i];
    const img = loadedImages[i];

    S.videoStatus = `Side ${r.pageNum} av ${results.length}…`; renderMain();

    // Draw image
    ctx.clearRect(0,0,1024,1024);
    if (img) {
      ctx.drawImage(img, 0,0,1024,1024);
    } else {
      ctx.fillStyle = '#1a1520';
      ctx.fillRect(0,0,1024,1024);
    }

    // Draw text overlay
    const grad = ctx.createLinearGradient(0,700,0,1024);
    grad.addColorStop(0,'rgba(0,0,0,0)'); grad.addColorStop(0.3,'rgba(0,0,0,0.65)'); grad.addColorStop(1,'rgba(0,0,0,0.9)');
    ctx.fillStyle=grad; ctx.fillRect(0,700,1024,324);
    ctx.fillStyle='rgba(184,145,42,0.92)';
    ctx.beginPath(); ctx.roundRect(22,984,62,26,13); ctx.fill();
    ctx.fillStyle='#fff'; ctx.font='bold 13px Georgia,serif'; ctx.textAlign='center';
    ctx.fillText(`${r.pageNum}/${results.length}`,53,1001);
    ctx.font='22px Georgia,serif'; ctx.shadowColor='rgba(0,0,0,0.85)'; ctx.shadowBlur=6;
    const words=(r.storyText||'').split(' '),lines=[];let line='';
    for(const w of words){const t=line+w+' ';if(ctx.measureText(t).width>950&&line){lines.push(line.trim());line=w+' ';}else line=t;}
    if(line.trim())lines.push(line.trim());
    const shown=lines.slice(0,5),sy=752+Math.max(0,(5-shown.length)*17);
    shown.forEach((l,li)=>ctx.fillText(l,512,sy+li*34));

    // Wait — duration per slide
    // If speech: wait for utterance to finish
    if (withSpeech && r.storyText) {
      await new Promise(res => {
        const u = new SpeechSynthesisUtterance(r.storyText);
        u.lang='nb-NO'; u.rate=0.88;
        u.onend = res; u.onerror = res;
        speechSynthesis.speak(u);
        // Fallback timeout in case speech stalls
        setTimeout(res, 8000);
      });
    } else {
      await new Promise(res => setTimeout(res, 3500));
    }
  }

  rec.stop();
}

// ═══════════════════════════════════════

// ═══════════════════════════════════════
async function dlZip() {
  if (!window.JSZip) {
    const s=document.createElement('script');
    s.src='https://cdnjs.cloudflare.com/ajax/libs/jszip/3.10.1/jszip.min.js';
    await new Promise(res=>{s.onload=res;document.head.appendChild(s);});
  }
  const results = Object.values(S.jobData?.results||{}).filter(r=>r.status==='done').sort((a,b)=>a.pageNum-b.pageNum);
  const zip = new window.JSZip(), folder = zip.folder('eventyrbok');
  folder.file('historien.txt', results.map(r=>`Side ${r.pageNum}:\n${r.storyText}`).join('\n\n---\n\n'));

  S.videoStatus = 'Laster ned bilder…'; renderMain();
  for (const r of results) {
    try {
      const resp = await fetch(imgUrl(S.jobId, r.pageNum));
      const buf  = await resp.arrayBuffer();
      folder.file(`side_${String(r.pageNum).padStart(2,'0')}.png`, buf);
    } catch(_) {}
  }
  const blob = await zip.generateAsync({type:'blob',compression:'DEFLATE',compressionOptions:{level:6}});
  const a=document.createElement('a'); a.href=URL.createObjectURL(blob); a.download='eventyrbok.zip'; a.click();
  S.videoStatus = ''; renderMain();
}

function dataUrlToBlob(dataUrl) {
  const [h,d]=dataUrl.split(','),mime=h.match(/:(.*?);/)[1];
  const bin=atob(d),arr=new Uint8Array(bin.length);
  for(let i=0;i<bin.length;i++) arr[i]=bin.charCodeAt(i);
  return new Blob([arr],{type:mime});
}

function addImages(files, arr, prefix) {
  const readers = Array.from(files).map(f=>new Promise(res=>{
    const r=new FileReader(); r.onload=()=>res({name:f.name,dataUrl:r.result}); r.readAsDataURL(f);
  }));
  Promise.all(readers).then(imgs=>{
    imgs.forEach((img,i)=>{
      const id = String(arr.length+i+1).padStart(2,'0');
      arr.push({id, name:`${prefix}${id}`, description:'', dataUrl:img.dataUrl});
    });
    render();
  });
}

function esc(s){return String(s||'').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;').replace(/'/g,'&#39;');}
function timeAgo(ts){if(!ts)return'';const m=Math.floor((Date.now()-ts)/60000);if(m<1)return'nettopp';if(m<60)return m+'min siden';return Math.floor(m/60)+'t siden';}

async function runAISuggest() {
if (!S.antKey) return;
if (!S.parsedPages.length) await parsePages();
try {
const r = await fetch(base()+’/suggest’, {
method:‘POST’, headers:{‘Content-Type’:‘application/json’},
body: JSON.stringify({pages:S.parsedPages, characters:S.characters, objects:S.objects, anthropicKey:S.antKey}),
});
const d = await r.json();
if (d.error) { alert(’AI-forslag feilet: ’+d.error); return; }
if (d.suggestions) {
for (const s of d.suggestions) {
const p = S.parsedPages.find(x=>x.pageNum===s.pageNum);
if (p && !p.visualDesc) p.suggestedVisual = s.visualDesc;
}
renderMain();
}
} catch(err) { alert(’Feil: ’+err.message); }
}

const cells = Array.from({length:total},(_,i)=>{
const pageNum=i+1, r=results.find(x=>x.pageNum===pageNum), inRerun=S.rerunSet.has(pageNum);
